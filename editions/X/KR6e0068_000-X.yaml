body:
  text: 華嚴經合論纂要目次卷上沙門慧研序此序既載於續藏經第五套合論卷首故今省之十門分別世主妙嚴品第一如來現相品第二普賢三昧品第三世界成就品第四華藏世界品第五毗盧遮那品第六卷中佛名號品第七四聖諦品第八光明覺品第九菩薩問明品第十淨行品第十一賢首品第十二昇須彌山頂品第十三須彌頂上偈讚品第十四十住品第十五梵行品第十六初發心功德品第十七明法品第十八升夜摩天宮品第十九夜魔天宮偈讚品第二十十行品第二十一十無盡藏品第二十二升兜率天宮品第二十三兜率天宮偈讚品第二十四十回向品第二十五十地品第二十六十定品第二十七十通品第二十八十忍品第二十九阿僧祇品第三十如來壽量品第三十一菩薩住處品第三十二佛不思議法品第三十三如來十身相海品第三十四如來隨好光明功德品第三十五普賢行品第三十六如來出現品第三十七離世間品第三十八卷下入法界品第三十九自䟦圓理跋華嚴經合論纂要目次終
