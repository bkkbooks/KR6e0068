body:
  text: 唐太原長者李通玄撰明擕李比丘方澤纂夫有情之本依智海以為源含識之流總法身而為體以為情生智隔想變體殊達本情亡知心體合今此大方廣佛華嚴經者明衆生之本際示諸佛之果源其為本也不可以功成其為源也不可以行得功亡本就行盡源成源本無功能隨緣自在者即此毗盧遮那也以本性為先智隨根應一悲濟物以此為名依本如是設其教澤滂流法界以潤含生於是寄位四天示形八相菩提場內現蘭若以始成普光法堂處報身之大宅普賢長子舉果德於藏身文殊小男創啓蒙於金色以海印三昧周法界而降靈用普眼法門觀塵中之剎海依正二報身土交參因果二門體用相徹以釋天之寶網彰十剎以重重取離垢之摩尼明十身而隱隱無邊剎境自他不隔於毫端十世古今始終不離於當念其為廣也以虗空而為量其為小也處極微而無迹十方無卷匪虧於小相之中纖塵不舒含十方而非礙智海果德殊分於五位之門常住法堂示進修於九天之上此方如是十剎同然聖衆如雲海會相入智凡無礙狀多鏡以納衆形彼此無妨若千燈而共一室此經總有四十品勝典玄開果德之門百萬億妙言咸舉佛華行海十身十會闡十十之法門十處十方啓十通而疏十辨出現品內示因果以結始終給孤獨園利人天之明法界目連鶖子隔視聽於對顏六千比丘啓十明於路上覺城東際五衆咸臻古佛廟前同登十智善財發明導首用彰來衆齊然又成五位法門具德行某軌範令使啓蒙易達解行無疑還信首文殊之前正證妙峯之頂經過五衆成一百一十法門至慈氏之園結會一生佛果返示文殊初友明以果同因後入普賢妙身彰體用圓極此經明大方廣佛華嚴者大以無方為義方以理事為功廣則毫剎相含佛乃體用無作華喻行門可樂能敷理事之功嚴即依正莊嚴之義釋此一部總作十門分別一依教分宗二依宗教別三教義差別四成佛同別五見佛差別六說教時分七淨土權實八攝化境界九因果延促十會教始終第一依教分宗者夫智境圓寂何法不周理事二門一多相徹只為器有差殊軌儀各異始終頓漸施設不同初學之士未諳教迹執權成實迷不進修故今咸舉衆宗略分十法一小乘戒經為情有宗如來創為凡夫造業者說是應作是不應作等且約凡情虗妄之處橫計諸惡以教制之令生人天如華嚴經持戒則以身身業語語業意意業佛法僧戒等十法諦觀求其梵行了不可得是名清淨梵行是名持佛性戒得佛法身故初發心時便成正覺不同小乘有取捨故二梵網經菩薩戒為情有及真俱示宗為欣樂佛果者說盧舍那為本身千百億為化身頓漸俱示一教被二根然仍化身所化方來至本身也華嚴則一下頓示本身本法界等三般若經說空彰實為宗如來初為人天凡夫說二乘教繫著理事俱實不能離障故說十八種空法乃至四諦三世等一切皆空空却無明諸障等業自性涅槃方顯華嚴則空有之法勢不單行以文殊普賢智行交參事理相徹一品之中四十品經同入一言之內十萬頌文齊麾以性齊時齊行齊故成佛亦齊不同彼教成壞別時因果前後故四解深密經為不空不有宗如來於有教空教之後和會有無二見為不空不有即說五六七八等識皆以第九阿陀那純淨識為依如瀑水流生多波浪諸波浪等以水為依引彼凡流就識成智以智隨緣照機利物異彼二乘權學破相成空智隨緣時無性相無生滅異彼凡夫繫而實有故名不空不有雖復如是於心識之處令知空有無二非如華嚴直為上上根人頓彰根本智佛體用性相法報果海五楞伽經以五法三自性八識二無我為宗在南海楞伽山說其山高峻得神通者方能升往表心地法門無修無證者方能升也下瞻大海表心海本自清淨識波浪動因境風轉若達境空心海自寂心境俱寂事無不照如海無風森羅炳現故說種子業識為如來藏頓示根熟菩薩異彼二乘滅識趣寂亦異般若修空菩薩樂空增勝亦異深密別立九識接引初根漸令留惑長大菩提不令其心植種於空亦不令其心如敗種深密乃入惑之初門楞伽維摩直示惑之本實然是穢土山峰化佛即識成智法門與華嚴華藏境界佛果法果之門行相懸絶六維摩經不思議為宗入道方便與華嚴略同如云夫求法者應無所求乃至觀身實相觀佛亦然我觀如來前際不來後際不去今則無住等其他身相淨土神通法門種種各別如手斷東方足指按地室容多座芥納須彌處於生死現身有疾等皆有往來分劑自他未忘非如華嚴塵含剎海身遍十方如光如影法如是故七法華經會權入實為宗引彼三根歸於一乘名與華嚴略同然其軌範有多差別如教主即是化身來證之佛還過去多寶如來非是無量相海功德之身一時一法界之法光照萬八千土非彰無盡境界三變淨土非華嚴即此娑婆即是華藏互相含入無移轉相龍女轉身成佛意令三乘心生奇特趣真知見非是法界緣起凡聖體同情在即凡情亡即佛俯仰屈伸皆菩薩行無轉變相往南方無垢世界自他彼此猶隔非即自他相徹因陀羅網境界龍女成佛雖復頓印無時之門而亡乘餘風未殄未能頓證遠劫方登故授遠記非是初發心時便成正覺設有餘習以佛知見而瑩治之無佛知見但成折伏不得入佛駛水之流還經遠劫方能入也八大集經以守護正法為宗於欲界上色界下安立寶坊集諸人天魔梵等皆就寶坊勑令守護正法諸不往者四天王放熱鐵輪逐之九涅槃經佛性為宗在跋提河以神力故地無沙石荊棘非華藏金剛為地等見佛涅槃涕淚盈目非是法界身雲忽然而有無所從來忽爾而無無所從去一切時處示現色像有無自在皆是大菩薩等能證菩提所證涅槃二俱滅故方應真理故云生滅滅已寂滅為樂如來隱身不現及諸能所心盡名大涅槃令諸三乘樂著行者離行離修非是理行無礙一時頓印法爾如然無有始終先後生滅成壞等位階十地尚不了了見性非十住初心便成正覺等牛食雪山肥膩草者純得醍醐不作乳酥一下直頓體不變移及訶二乘見佛八相成道等皆為曲見即同華嚴智入三世而無來往一念見道新故總無等令屠兒廣額賢劫成佛以破闡提無佛性見如法華龍女成佛以破三乘遠繫二經大意皆令三乘捨權入實但諸事宜不能全具唯是華嚴根本佛門理事性相輪圓具足十華嚴經以根本佛乘為宗又以因圓果滿法界理事自在緣起無礙為宗直以毗盧遮那自體智慧果德普示衆生還令大心衆生信佛果德成自因位還修理智萬行大悲果德初發心時便成正覺和融理行任運成滿以是法界智故法界性相本唯真智所有分別全是智為無明體真即是佛故一念相應一念佛一日相應一日佛不須變易方成佛也龍天變易豈為佛耶三乘之人亦變易何故待三僧祇方乃成佛當知此宗見性成道如幻住世化如幻衆不出不沒性無變化本來如是即是佛故隨緣六道行菩薩行變化神通接引迷流乃至苦行麻麥剃髮染衣藉草等事為化外道及諸三乘非是自須如是第二依宗教別者夫任器現形應根施教如空谷響應擊成音谷響無心亦無處所但以隨緣而能普應如來雨法亦復如斯稱自根緣得自心法隨根增廣而成熟之約立先德十家教行一後魏菩提流支立一音教謂一切聖教唯是如來一圓音教但隨根異種種差殊如經一雨所潤等二陳真諦三藏立二教一漸約漸悟大由小起即涅槃等經二頓真往頓機大不由小即華嚴經三後魏光統律師立三教一漸二頓三圓四齊大行法師立四教一因緣教謂小乘薩婆多等部二假名教謂成實論等三不實教謂般若等四真宗教謂華嚴涅槃等五護身法師立五教於前四教內真如佛性以為真教即涅槃是五法界教即華嚴法界無礙門是六思大禪師智者大師等立四教謂藏通別圓藏即小乘亦名三藏學者通謂漸教通被三根故別謂頓教頓說大乘法門不通小故圓即法界圓滿一即一切一切即一無礙法門華嚴法華經等七新羅元曉法師造疏亦立四教謂三乘別教三乘通教三乘分教一乘滿教謂華嚴經普賢教八唐吉藏師立三教初說根本法輪即華嚴中說枝末法輪即三乘最後說攝末歸本法輪即法華九梁雲法師立四教謂羊鹿牛車為三乘四衢道中所授大白午車為第四乘十唐印法師立二教一釋迦經屈曲教化身說二華嚴經十身教盧舍那說右十家並當世英才旨雖不同同明佛日思智二德位已升堂雲公演法雨華亭下悟靈山於即夕法眼逾明登果位於今辰道齊遐古只如佛說內外中間之言遂即入定五百羅漢解各不同佛出定後同問誰當佛意佛言並非我意又問不當佛意將得罪耶佛言雖非我意各順正理堪為聖教有福無罪況此諸德各有典據今藏法師承稟儼法師所立五教深有旨趣一小乘教二大乘始教深密經中定性二乘俱不成佛此說未盡大乘法理故為始教三終教定性二乘及闡提無佛性者悉當成佛猶未盡大乘至極之說立為終教上始終二教並依地位漸次修成俱為漸教四頓教但一念不生即名為佛不從漸次故曰頓教五圓教一位即一切位一切位即一位普賢法界帝網重重主伴具足故名圓教如此經說藏法師作如是和會又西域戒賢法師遠承彌勒無著近踵護法難陀依深密經瑜伽等論立三教初鹿苑小乘四阿含經說生空未說法空二般若教說諸法空未說唯識道理三深密經等具說三性三無性等智光論師遠承文殊龍樹近稟提婆清辨依般若等經中觀等論亦立三教此乃西國法將皆詮聖教一方軌式仰惟高旨未可僉量今通玄自參聖旨該括佛興始末略立十教一時說小乘純有教如戒經等二時說般若破有明空教三時說解深密經和會空有教四時說楞伽經契假即真教類翻無明業種之識為如來藏明與無明其性無二然希出俗未現同纏五時說維摩經即俗恆真教破前四教令彼三乘淨相心亡入纏無礙六時說法華經引權歸實教七時說涅槃經捨權向實教相盡見性之門八說華嚴經於剎那際通攝十世圓融教經云入剎那際三昧降神乃至涅槃為依本性理智本無時故名之為入非是本法性中而有出入三昧以化儀軌則施方便言不可無言滯其化跡令諸羣品都無所歸是故明人莫言世尊一人入剎那際三昧諸佛世尊常於法身智海與衆生數等諸三昧門應衆生見本無出入應如是知如來三昧出入之相此法界門頭尾長短始終路絶該括諸教諸行一切境界總作一時一際之法猶如衆流皆歸海故出此法外別生情量總是權門如此法門佛不出世亦無涅槃從初發心以三昧力頓現三界三世一際諸法一味解脫涅槃常寂滅味因果一際諸性一性諸相一相諸行一行三世一念一念三世乃至十世自在無礙名為常轉法輪入一總得餘為法界一際故入餘總得一為法界體無礙故如圓珠無方如明鏡頓照如虗空無隔如響無依如影不礙如化人所生此法門者是該括始終一際無出無沒常轉法輪一切權乘總在其中一時而說以俱不出法界無三世故但以各依自見無量差殊此一乘教是始成正覺時說若依情是最初成佛時說若依智無始終說九共不共教人天三乘共在佛海中而見聞各別大小不同又一切衆生本與諸佛共法共智共時共身共心共乘而知見解脫各各不共如五百聲聞同在會如聾如盲是其事也十不共共教如此經會中天龍八部等各各差殊同得聞佛果德法門如是十教總是如來於本法界一剎那際一時一聲頓現如響隨諸衆生自分根力漸頓不同第三教義差別者夫大雄世尊身心性相都無所為但以性起大悲稱法同體從無作智隨緣教生一雨所滋任生各異或名同而義別如漸教十地圓教十地等或言別而義同十方世界法門皆是四諦法門法不自施隨根教立且約最上之徒及以漸漸之衆粗十法一佛日出興教主別此經以毗盧遮那為教主毗華言種種盧遮那華言光明遍照即以法身悲智為名不同權教牟尼華言寂默但讚法身無言說相不言智悲又華冠鐶釧即俗即真無出俗剃髮之相又無邊相海非三十二相等二光明表法別初會以告衆雲集故放齒光將談果海故放眉間中道果光將說十信以果成因之法故放眉間還入足下之光十住以創陟聖階故足指放光十行以發行故放足趺光十回向以智行回旋自在故膝輪放光十地以功終故還放眉間果光出現品以自果佛現還放果光灌文殊頂以談自佛萬行故放口光灌普賢口如是十度放光表因果次第不相雜亂不同餘教放光無次第也三問答主伴別此經總相具德有三謂佛文殊普賢佛表果德無言當不可說不可修不可得不可證文殊因位可說以說法身果德普賢自行可行行其行海充遍法界用此三德利樂衆生文殊成贊法身本智普賢成差別智之行德一切諸佛皆依二尊者以為師範成就極果或說普賢為長子為建行成滿衆生故又東方震為長男為青龍為春生像日出堪施作務隨緣運用故普賢為行首故文殊為小男創證法身本智初生諸佛家故為啓蒙之首故又艮為小男在丑寅間平旦創明暗相已無日光本著像初住始見道故又住東北方清涼山託世間法令易解故又一切處文殊法身智遍故所從來金色世界金體白而相黃表法身無作唯無依智為白無依智用無貪恚相即有和氣為黃為福慶色也觀音在金剛山西阿西為金為白虎為凶為殺於不善處行慈運悲是觀音也文殊普賢觀音三法是十方佛所共行觀音為善財十回向中第七慈悲位中知識主方便波羅蜜以方便法行於非道非權學六度菩薩有畏愛者之所堪也四因果圓滿別如涅槃無行等經六生滅滅已寂滅為樂等但明法身無作之果以不具行故權教積行滿三僧祇劫之果言從行修成以不了無明本是法身智慧厭而以空觀折伏現行煩惱欣別淨門故又化佛所有功德總是修生如云然燈得光明忍辱得端正等華嚴則不然一念頓證法界法門身心性相本唯法體任無依智施為運用即是佛也恆沙德用法爾具足普門法界諸障自無用別對治別修別斷不見變化變與不變無別性相普觀一切無非法門無非解脫以是因果同時之法為法界海中因果不可得故不可得中因果同時無障礙故位位中菩薩入定皆有十方同名佛來菩薩是因來佛是果表體用相徹因果無二故以法界智行菩薩行設同凡事經過多劫而於自見不移時故五地位行相別依大乘根品有六種所乘之門阿彌陀經念佛願生淨土門為未見性有自他往來是為一無量壽觀經作淨土觀行所生淨土門從心想生非了性故是為二般若經修空無我觀門以破凡夫實有二乘我執故多修空法空增勝故雖行六度得六神通然是析法明空不見佛性不生佛家是為三深密經和會有無觀智門以般若修空壞緣生法故說緣生自體涅槃和會有無不令互斥但立十地斷惑行相而無三賢十信未是理事相攝法也又仁王經說五位十地多生積行修假真如又有教說地前伏惑地上見道並對權根非為實說是為四漸見佛性進修門如仁王深密大品三經立假真如以成十地是為三種權教十地涅槃經十住少分見性乃至十地未能了了是為分證十地而牛食肥膩草純出醍醐即為明證十地并華嚴一乘十地是為實教三種十地權實十地凡有六種是為五頓證佛性理智萬行圓融門如華嚴經法門是法界大宅一切權教總居門外中間安立軌像無一事空施故子為佛位丑為信位寅為住位卯為行位辰為回向巳為十地午為等覺未為晦明入俗申酉戌亥為所化故易坎為君離為臣震為上相為青龍為吉慶酉為上將為白虎為凶害如來治坎而發明普賢為智相主萬行觀音以大悲為上將治凶危文殊為覺蒙之師互體交參以持佛家之法皆令衆生住於中道以是身皆金色其諸菩薩皆以自證果德為名皆以自證本法為國非衆生行業影像地水火風之國皆以本智利生行果為所事佛一一法像帝網重重是為六也總論諸教地位行相有此六種乘有修真者勿滯權門虗煩多劫六重令善財證法別如文殊覺首等說十信法門善財於福城東見文殊而證信位法慧等於須彌頂說十住法門善財見德雲等十人而證十住夜摩天說十行法門善財見善見等十人而證十行兜率天說十回向法善財見青蓮華等十人證十回向他化天說十地法門善財至婆婆演底夜天等十善知識所一一證之三禪天說佛華三昧等覺位中普賢境界法門善財參摩耶夫人已下十位一一倣而行之令成後則於菩提場中始成正覺時說佛果法門善財於毗盧樓閣中參彌勒菩薩而證佛果以至果同因因果相徹無先後故彌勒還令善財見初友文殊以由普賢行得成正覺已常以普賢行導利衆生與普賢同故便見自身入普賢身中以令後學解證無疑又文殊普賢彌勒三人一處表通因徹果故三人之道是三世之通途源始之法際古佛道法本來常如處迷者自沒輪回迷解即本來全得無生無滅無作無為修之者放逸者皆有所作故曰欣寂不當放逸還非以皆纏情自乖聖性當以定慧力善自觀之勿滯其事七六位菩薩來衆別如信位內文殊覺首等從金色等世界不動智等佛所來金為白色明法身本體不動智明法身之內無作性智是根本智文殊即能證之因不動智即所證之果表從本智所來來處是己身之智所來是因明因從本智果來如全將金體以成鐶釧全將佛體以成菩薩全將佛果以作自身舉此同體無二因果以成十信法門還令學者信果成因還修果法以成因位十住初心便成正覺所謂以少方便疾得菩提是也十住十行十回向十地及等覺位中所有菩薩衆海皆是佛果位海非是凡夫雖法界品逝多林舍利弗等影響聲聞示同聾瞽以令實聲聞人回心向大非劣衆也八所施法門事理別權乘中說有情有佛性無情無佛性等華嚴即是越情實教如十林菩薩以慧為國明一切境界總為慧體有情無情無二見也是法住法位世間相常住又可作情無情計耶故山河樹木皆能現佛菩薩身及說法與佛體同能同能別自在無礙一一境中纖塵之內佛身出現剎海重重佛身無盡佛身毛孔亦復如是境界重重互相徹入不論如是情與非情九與諸三乘得果別聲聞觀苦集二諦深生厭離作無常不淨白骨等觀知身空寂智滅身亡不生悲智名之為滅以此滅處名為涅槃設從空起亦無三毒如呪毒蛇呪力持故毒不得起以修人無我法三毒業空滅伏諸苦名為道諦楞伽云譬如昏醉人酒消然後覺彼覺法亦然得佛無上身言若知過回心亦成佛也緣覺人知十二緣自體皆空身心無主性恆無我以無我故十二緣滅任性逍遙不趣聲聞之寂亦無菩薩悲智權小菩薩但說六波羅蜜未說方便等四波羅蜜不能入生死海猶修假真如觀破空有二執成不生不滅法門九地以來未明佛性為修假智乃成障故此華嚴為上上根人頓示本法十住初心便同諸佛以依本智法即無所修故本無障故任運悲智不作而成隨緣六道無非法界了緣生法自體恆真更無修作所有念慮皆從智生但知任運對現色身說法應機如響相對恆處生死流法身恆寂雖經多劫體不移時入死出生非沒生也故五地修十種四諦觀六地修十種十二緣故十方佛皆說四諦法輪以知苦集元是根本智故不同三乘有欣厭故十付法流通別三乘之教付囑諸聖及諸凡夫以法未真易信解故且令聖凡共質令教流行此法界根本法輪出情難信之教要待入證生在佛家為佛真子方是流通但有聖說無入證者不名流通但有凡夫說教無入證者亦非流通為自法不明疑情猶在不破自他暗未能決定知佛意故故付大心凡夫入證位者令諸凡夫直下自信證十住位生在佛家為佛真子有是流通第四成佛同別者夫智身寥廓總萬像以成軀萬像無形與智身而齊體違真相隔得本形同只為乖本相殊致使化儀差別今約人天權實之流分為十種一佛身別如經說有九十七種相及無盡相身非三十二相等二成佛時別如云如來不出世亦無有涅槃即是法界無始終前後之時不出不沒不成不壞如來常住在世常轉法輪能如是知即是佛出興也非如化佛逾城出家成道等三菩提樹別即高顯殊特莊嚴寶樹如金剛藏身中所見之樹意明遍一切處之樹非化佛木樹高下但稱人間四座別妙寶蓮華師子之座非藉草也五大衆別皆智圓多劫一際無前後時衆也六示相別權乘中八相成道等此一乘即以初發心住會法身本智以為正覺情絶始終不見時遷及以不遷不乖當念蘊功即佛應真自性常轉法輪法華經云吾從成佛已來經無量阿僧祇劫此是回彼三乘就實而論其實如來不出不沒不成不壞常住在世七轉法輪別毗盧遮那一乘法輪所謂佛乘法華經云佛乘唯有一無二亦無三乃至乘如來乘直至道場是也如龍女剎那成佛雖有轉相亦是一乘之門有說龍女是化者苦哉翻成謗也八說法處別化佛說法或塵苑或給園皆有處所往來此經十處十會及一切塵中佛身佛國重重無盡常轉法輪不去不來不出不沒九大會莊嚴別十方來衆皆云十佛剎塵位位地地十百千以次增多為明無盡一一衆會皆遍法界一一塵中衆會重重皆與法界虗空等乃至於一小衆生身中成道說法衆海重重其彼衆生不知不覺如是衆會皆為諸佛菩薩性遍一切處身土衆會皆遍一切處十所授法門別為法界自體法身古佛迷在無明頓以方便三昧而令現之十住初心全得佛果一念一時一際一法界門頓收文殊普賢萬行理事更無情量卷舒延促不廢隨俗時劫日月歲數然其歲劫當自不移了知苦諦本來聖諦元無諸苦亦無涅槃如是信解如是證入以少方便疾得菩提即以智幻門幻生其身等衆生界同衆生事即以無礙念門了衆生根即以師範門以成軌則即以衆藝門訓誨衆生即以無依道場門法無所著即以無念門念而不著即以淨智光明門恆照無礙安立諸法度脫衆生即以無盡相門不壞色身即以誠願語門出言誠諦即以幻住門常住世間成就衆生諸根解脫此十法是善財等覺位內善知識利安衆生之門令諸學者頓修悟入以此十法善住世間非如三乘厭苦樂滅亦非留惑樂空出纏別求淨土第五見佛差別者情存相隔見絶體齊身立影生情留佛異佛由情應以此乖真心盡情亡智身自稱隨緣無作動寂俱真如是相應名毗盧遮那也只可歸真去假不可滯假亡真略立十種差別使創信者返末而還源也一人中見佛但有三十二相二諸天見佛八十種好三諸龍見佛或同人見或見但為大龍王餘畜例然四諸仙見佛但為大仙五外道見佛與己同類六八部神等見佛與己為王七小乘人見佛為大聲聞八緣覺人見佛還為緣覺九權教菩薩見佛但為三千大千世界之主福智充遍大千世界十佛乘中見佛為十佛剎塵蓮華藏世界海法界主福智充滿一切諸剎無盡相海重重故如上見佛不同皆由信樂差別是故當發廣大心信廣大教發廣大願行廣大行人廣大智利益成就無盡衆生成大菩提若不如是終非究竟勞而功少何如直往一切智之本智中也第六說教時分者夫道源虗寂三世智圓會萬像齊有無混去來印今古情亡智立想絶悲存一雨普滋百卉齊得圓音遐布獲益隨根略依權實分十種時一力士經說佛成道一七日即於鹿園說法二大品經說佛初鹿苑轉四諦法輪三法華經說三七日詣鹿園四四分律及薩婆多論云六七日方說法五興起行經云七七日方說法六三分律云八七日方說法七大智度論云五七日方說法八十二遊經云一年不說法九今唐朝藏法師判佛成道定經二七日後方說華嚴經十今依法界門法身本智理事大悲之宗不依情量時分之說古今見盡常轉法輪無始無終法如是故情亡心盡任智利人即是佛出興轉法輪時法華經云吾從成佛已來經無量阿僧祇劫量既本無擬將何為說法時也第七淨土權實者夫遮那法界體相括於塵沙方廣靈門淨穢互參於無極但隨自修業用見境不同致使聖說乖違依根不定或權分淨土於他國指穢境於娑婆或此處為化儀上方為實報文殊住東國而來觀音處安樂而至如是權儀各別啓蒙的信無依今略會諸門約申十種一阿彌陀佛淨土為一分取相凡夫未信法空實理以專憶念念想專故其心分淨得生淨土是權未實二無量壽觀經淨土為一分未信法空實理樂妙色相者令其想彼色像想成就故而生佛國此權非實三維摩經淨土佛以足指按地加其神力暫現還無是實報土未具陳廣是實未廣四梵網經淨土說千華并百億四天下等為三乘菩薩見未廣故分示報境未成圓滿是權未實五摩醯首羅天淨土為權教菩薩染淨未亡者說此欲界閻浮提為有漏彼摩醯天為實報亦權未實六涅槃經淨土言有實報淨土在西方過三十二恆河沙國土外此三千大千世界總是穢土亦為權乘中一分染淨未亡者說是權非實七法華經淨土有移置天人三變之相亦為染淨未亡者說是權非實八靈山會所指淨土令三乘人知此土即穢恆淨諸衆信可未能自見是實非權九唯心淨土自證自心當體無心性唯真智不念淨穢稱真任性心無恚礙利安衆生是實淨土以自淨故令他亦淨云隨其心淨即佛土淨十毗盧遮那淨土即華藏世界淨穢總含無穢無淨無有上下彼此自他之相一一佛土皆充法界無盡佛土不出一塵以法為界不限邊際相海純雜色像重重此為實報第八攝化境界者夫佛境無邊彌綸法界隨情廣狹見有差殊今依權實略示五門唯冀捨條從本返末還源速證菩提無令稽滯一人中見佛但化一閻浮提二諸天見佛隨自見境見佛亦然如帝釋梵王及諸天王是菩薩位即依菩薩位配所見廣狹非凡夫天也三二乘中大羅漢以天眼力見佛攝化三千大千如那律云我以天眼見釋迦佛土三千大千如觀掌中菴摩勒果如小羅漢即不定以久伏忍力能斷結使未有神力通變等事或見攝化一閻浮提以次羅漢或見佛化四天下等四權教菩薩見佛境界初地百佛二地千佛隨位漸增五實教菩薩初地見多百佛二地見多千佛多百多千即是無盡之百無盡之千以實言之三賢十地皆悉齊見如帝網等法界虗空總皆平等不分小大但行布之中寄位階降第九因果延促者夫法界無始無終智體非因非果但為有情存量假寄其名劈竹登梯隨根遲速量絶情亡名後何立故因果延促如空中鳥跡如石女生兒今依根別約立十門一小乘善來得阿羅漢果二小乘一生得阿羅漢果三小乘三生得阿羅漢果四小乘六十劫得阿羅漢果五緣覺四生得緣覺果六緣覺遲經百劫得緣覺果七權教菩薩定經三僧祇劫得成佛果八法華實教會三歸一令龍女剎那成佛以破三乘迂滯九兜率天子三生成十地果十善財一生成佛一生者一剎那際情亡見謝三世一念更無所生名為一生如是無生便成佛果如本生故名為一生還同龍女一剎那際情盡時亡名之為佛第十會教始終者夫慧日世尊稱法界而遍照智周萬有與凡聖而同真十處十會如帝網之重重十剎十身若鏡像之相入舉一門衆門俱發談一品諸品齊摩道樹始生九天同屆普光一集十處咸登今古無差舊新一念不離一位便分五位之門一行之中乃建塵沙行海欲使一念相應功程不枉今分十法以約紀綱一毗盧遮那始成正覺即世主妙嚴一品經是言始成正覺者古今相徹為始契法如是為成依法如是非心造作名之為正智達斯理名之為覺此經三十九品如瓔珞經說於三禪天說十一地佛華品即總有十處十會四十品並在初成正覺時以一剎那際海印法門一時頓說以法如是為前後故作重會三會普光殿者以皆情計違本法故於一念內現三世事為衆生故非於本法而有三世為明本法豈從末也如十定品離世間品皆云菩提場中始成正覺普光明殿入剎那際三昧敘致文字不無前後撿參經意總是通括一時一際一法界智用法門但隨法位菩薩名別非佛去已重來以普光明殿為法界德果大宅智之本都而十定門是法界體普賢離世間行是法界用故三度一處總是一時一會非可情計前後往來雖餘九會亦總在一會一時一法界一智海法門重重無盡一時隱現無障無礙是故此經有五種因果遍周初會六品為示成正覺因果遍周二會至六會二十品為信及進修因果遍周十定十通十忍等品為定體遍周普賢行品離世間品為行海遍周法界一品為法界不思議大圓明智海遍周故五處序致品首皆云世尊在摩竭國等明此五法是一時一處一法界一體用一切諸佛一同之法等周圓滿無前後義如王寶印一時頓印無先後成文以總別同異成壞六相并十玄門融通道理自見十玄門者同時具足相應門廣狹自在無礙門一多相容不同門諸法相即自在門祕密隱顯俱成門微細相容安立門因陀羅網境界門託事顯法生解門十世隔法異成門主伴圓融具德門此六相十玄遍一切法遍一切時遍一切處理事圓融性相無礙今於一法界內隨其進修治習方便行相門中寄位表法分其十處十會一菩提場二普光殿三須彌頂四夜摩天五兜率天六他化天七三禪天八逝多林九覺城東十一切國剎及塵中一切虗空法界如是等會總是普光明殿法界大宅之所含容以故此經和會因果成一際門凡有六處一初會中普賢菩薩入如來藏身三昧以世界海漩法門示佛本源法界華藏世界海因果始終報得之門普賢是行如來藏身是體即明以用入體理事相徹二如來寶座輪臺基陛一切莊嚴具中出衆菩薩法空大智為佛座體普賢萬行為用莊嚴即明理事因果體用相益三普光明殿三說始成正覺一際法門即明攝末歸本四如來出現品如來放眉間光灌文殊頂口中光灌普賢口令二人共相問答說佛出現果德法門文殊為智體普賢為行用即明智行相徹以此徹處即名為佛初會中佛即佛自所成佛出現品中佛即菩薩自力所及因信佛故發行修進自佛果成還與前所信佛無異五逝多林世尊入師子頻呻三昧而普賢說頌三昧是理普賢是行明以行會理放眉間光明普照一切而文殊說頌光是行用文殊是理明以理會行六善財於彌勒樓閣中和會文殊普賢及彌勒始終因果都為一際體用徹故二示果勸修即如來現相品至毗盧遮那品五品經是如來口光告衆令集普賢以佛長子治佛家法入佛三昧舉佛果德令衆敬愛起信樂修三信心成備即如來名號品至賢首品六品經是此六品共成信位文殊為覺蒙之師故舉自心根本不動智佛以成所信之門若心外有佛不成為信以心外有見即邪見故四入真實證即升須彌山品至明法品六品是明從信心升十住法王山頂智照無礙又山表定定能發慧從茲已去任法無功始終俱佛不從八地方具無功法流水中初水後水一性水者因佛果佛一性佛故無初中後不隔念故無念可隔因果便終一念相應一念佛故不論相好及與神通相好神通從此正覺中得若證正覺即不著諸相但以覺道恆相應故神變相好不求自至設至於後福智終時三世一時不移毫念如寶王印一時頓印無先後成文五發行修行即升夜摩天宮品至十無盡藏品四品是夜摩是空居天明從須彌山頂至相盡際證佛智身依本智法空行普賢行也六理事相入即升兜率品至十回向品三品是以十行事法回入十住理中令理事無礙體用相徹兜率在欲界五天之中表根本智差別智智悲均融處於中道七蘊修成德即他化天十地一品是以十地法門但於十住十行十回向中蘊積功成任運淳熟果終智滿住法本宮恆遍一切更無升進佛常現在非是新來故無升天并迎讚品此天依他起化以成己樂表此位依衆生故而行悲智無自心想八隨緣無礙即第七會三禪天人佛華三昧說十一地等覺位中普賢法門明十地自分道終等覺位中以普賢行遍周法界重重無礙此天憂喜情亡表等覺定亂情亡唯智悲利俗此會來文未足據瓔珞說九因果位終即普光明殿說十定品至如來出現品并離世間品總十二品經是以十定品至離世間品總括五位十地佛位及普賢萬行始終因果門前後徹故故十定離世間二品之初皆序始成正覺而與初會二會相同以十定是文殊智體離世間是普賢處世大用總在普光法堂一時都會但依位法菩薩衆號有異非是去已還來譬如空中百千寶鏡置一佛像在地以衆菩薩圍繞莊嚴於彼百千鏡中一時頓現一一鏡中影像互相參入都無往來如來亦爾於始成正覺之時天上人間十方國土一時頓現互相參徹都無來去十令凡實證即逝多林法界一品是如來入師子嚬申定現法界果德普莊嚴廣大境界令生信樂達佛實相以法界性中安立信等六位方便進修不離體用不壞方便其智彌高其行彌下隨立知行不迷因果令覺者善明總別依位成功不滯於始不離於初如六千比丘皆是凡夫於文殊所頓明十耳十眼普身十方成就佛法而不離文殊足下又一萬諸龍五百優婆塞五百優婆夷五百童子五百童女並是凡夫皆信法界佛果而登十住十地等於中舉一善財以例同然如善財因文殊發心而智滿後還見文殊以法界中一切法總神總真總不思議故如來神力說以法界體凡聖一體故於人間說如是法門諸有信解及證入者猶如師子王之子初生之時雖則未能如其師子王力勢自在而師子相全體無異一切諸獸已皆畏之諸信證者亦復如是雖未能堪力用如佛而信者已種佛種證者已生佛家為佛真子與佛智同超彼權乘得神通菩薩九地等見故云設有菩薩讀誦八萬四千法藏得六神通於此法門不聞不信又云不退諸菩薩亦復不能知以是出生死之不退非是達根本無明得根本智處生死之不退故並是法界智海大宅門外施設草庵姑免火難者故大方廣佛華嚴經者大是無方義方是法則義廣是理智遍周義佛是智體無依住義智自在義華是遍法界無盡行義以行能開敷自他果故嚴是莊飾義以十信中有作行華開敷十住位中妙理智慧果故復生十種無作行華常以互嚴自利利他之道故行為嚴飾義此經以毗盧遮那大智法界本真自體寂用圓滿果德法報性相無礙佛自所乘為宗令初發心者志樂廣大還得自心無依住性根本不動智與諸佛智合一無二故是故此經常以佛果為進修道跡是佛根本大智古跡修差別智故若異佛古跡而有進修無成佛義如三乘且免一分麁生死苦非是依佛智體古跡修佛乘也又此經以一切衆生根器佛一圓音一念三世無始無終常轉法輪以為教體大要言之一切衆生諸煩惱海一切衆生隨分善根人天樂果聲聞緣覺菩薩佛乘解脫涅槃名句文身語業等及一切善惡果報虗空法界言與無言一切法無非教體此經始終徒衆形相總有二百二十八衆形類部從莊嚴道場形類各異當會事意皆有所表初一品有四十七衆表意如下世主妙嚴品第一諸天神王八部及菩薩導利衆生之衆皆是世間之主佛成正覺咸來慶讚各與佛剎塵教眷屬或將無量部從共嚴海會以主伴交參同彰法象故曰妙嚴此經是法界智之真我見法界智之真佛聞法界智之真談入法界智之真理當是文殊普賢神洞真源道齊智海者之所傳持非三乘人所能也一時者法界無時是佛說法時也摩竭提此云遍聰慧以人多聰慧名國阿蘭若法此云最寂靜處是閻浮提最中故諸佛成道皆於此也場是揀穢處菩提場表治惑明示現成佛治衆生惑也始成正覺者古今情盡為始心無所依為正理智相應為覺得如是法名為成也其地金剛所成地上有十種寶嚴者法身因報得金剛地十波羅蜜成其寶嚴以嚴地也寶樹行列樹上有十種嚴者覆蔭衆生行為因報得寶樹以智行相徹故一切嚴具樹中現像以方便破暗故樹出光明以願興智故光中雨寶因果徹故寶中菩薩如雲出現也宮殿樓閣充遍十方而亦十種嚴者大悲含育以成其宮大智利生以成其殿以智觀照為樓知根設教為閣大願遍周故充十方以十波羅蜜隨大悲生復成十種依報而無邊菩薩咸集其所也其師子座高廣妙好亦十種嚴者於大衆中得無所畏故稱師子法界以為座因故無限量以智隨萬行故十種具足嚴座以因位十地法雲潤澤故座出音說佛境界悅衆生也如是莊嚴皆是如來大智大願任運報得如龍遊雲起虎嘯風生報感應然非物能與為也智入三世悉平等者智能隨俗言入三世俗體本真故言平等以總別同異成壞六相義該括即總而全別即別而全總即同而俱異即異而俱同即成而俱壞即壞而俱成皆非情計一異有無等生滅相故以自體無念力大智照之可見其身充滿一切世間以下總明如來身語智三業依正隨用自在也十佛剎塵菩薩圍繞上首菩薩名普賢者行與理齊利生皆遍曰普隨緣成德曰賢次九箇菩薩上字同名為普者明此十普之義是一人之普一一菩薩具十普也下明別者明一一普賢能遍別故普義方得成也此十普衆是十方佛同行之行更無舊新如王大路其奈不行之何此十普菩薩是佛自普賢行果如來是正覺之果如來所居華藏淨土是佛報得依果一切衆生以自根性觀佛三種因果及佛自普賢門而生信心若不如是從何生信是故如來以此三種因果而令衆生信樂修行海月光大明菩薩直至大自在天王凡四十衆每衆主伴十人總四百人表佛自行十住十行十回向十地中四百箇波羅蜜門以四位中四十箇波羅蜜門每一箇波羅蜜門自具十波羅蜜故成四百箇波羅蜜門前普賢一衆十人皆具十普之德十人互參自具十衆十人當百還表佛自行等覺位一百箇波羅蜜門以故雖則四十一衆還當五十衆主伴五百人表佛自五位五百箇波羅蜜門海月光大明菩薩至大自在天王都為四十衆通十普賢一衆并菩提樹內流光衆如來宮殿衆如來座內衆十方諸來菩薩衆菩薩毛孔衆如來眉間毫中衆都為四十七衆菩提樹內衆并宮殿衆前已釋座內衆明是如來往昔自行與古同因彰果衆諸來衆是興供衆毛孔光明衆是法界性起無礙一多同異自在大悲無盡不思議衆如來眉間毫中衆是示果成因生信利生衆此是成佛後以十信心位乃至十住十行十回向十地等覺遍法界法門衆舉此自修因果還令學者倣之海月光大明等十菩薩是佛果位中以普賢行入俗利生之衆以其行異其名亦異以普遍別方成普義以明十住初心一下頓乘古法不移舊跡如大王路新舊同行以此開悟迷流還令學古一同自法故寄位初發心住以表初住所行檀波羅蜜中主伴十波羅蜜海月光大明菩薩表檀波羅蜜以檀波羅蜜為主餘九箇菩薩名號為伴以法施廣濟為海令他清涼為月光自他普照為大明故表檀也雲音海光無垢藏菩薩表戒波羅蜜者性戒大悲普雨法音為雲音性戒如海不宿死尸而萬法總淨為海光無垢藏故表戒也功德寶髻智生菩薩表忍波羅蜜者髻是首飾忍為上首故寶嚴其頂以能忍故是智生也功德自住王大光菩薩表精進波羅蜜者利生不倦自在如王普令開曉故大光也善勇猛蓮華髻菩薩表禪波羅蜜者明從凡起信入證之初一念無思頓超諸想真智冥會是勇猛義以禪體處世即真不染寂亂為蓮華髻也普智雲日幢菩薩表般若波羅蜜者以慧雨法為雲慧光破暗為日摧邪顯正名為幢也大精進金剛齊菩薩表第七方便波羅蜜者大悲堅固入俗無疲名大精進壞他堅垢名金剛以處智悲中際為齊齊是身之中也香𦦨光幢菩薩表第八願波羅蜜者大願弘芳為香以智隨願破惑為光入邪破障為幢如八住善知識毗目仙人示作外道與邪同行破邪師道等是也大明德深美音菩薩表第九力波羅蜜者以法師位善說法故以為名也大福光智生菩薩者明此是智波羅蜜也此十菩薩名明初住中以此十法治染淨成法身悲智之門計此修治法合一法今說諸波羅蜜各各不同明於一法上以十法修治慣習增明以成其一其法不離舊行時亦不移舊時時無性故三世無去來故但於一法上具十法行門體用但於一法上修行生熟處分一住二住但於一法上會悲智願行生熟淺深不同隨不同處分其地位差別以六相義圓通可知非是法之異也此下諸神王天衆皆以自一為主餘九為伴一一名義隨位配列妙色那羅延等十執金剛神表第二治地住法門主戒波羅蜜中十波羅蜜以戒防護為執戒體不壞為金剛以性齊諸佛智同真理隨普賢行處世護持自心合理其智自神不思不為而通萬有曰神非鬼神之神也妙色那羅延神表戒波羅蜜中檀波羅蜜門者以性戒成檀感招妙色那羅延是不壞義以性戒破惑得不壞身也日輪速疾幢神表戒中戒者戒光無缺名日輪見者應真名速疾自他惑盡為幢心無異念為執性不可破為金剛稱真自在名之為神須彌華光神表戒中忍行以法忍高勝為須彌以忍嚴行人見皆悅為華觀者破慢為光餘七神義以次配知此是第二治地住中十住主伴十波羅蜜門華髻莊嚴等十身衆神表第三修行住法門主忍波羅蜜中十波羅蜜如歎德云皆於往昔承事供養一切諸佛已成諸佛何藉供養明以衆多身雲衆多嚴具於一切時供養一切衆生令其成佛為衆生與佛體無有二是調忍義是身衆義故華髻莊嚴神表忍中之檀以忍最勝報得頂嚴也光照十方神表忍中戒者以忍為戒體法忍戒光令衆喜悅為光照也海音調伏神表忍中忍者聞諸善惡毀讚多如潮音不生憂喜又自以聲如潮教化令無失時是調忍義也餘七神義以次配知寶印手等十足行神表第四生貴住法門主精進波羅蜜中十波羅蜜以智隨精進滿足衆行為足行神寶印手神表精進中檀者明以法寶智印行精進行引接衆生手是引接義蓮華光神表精進中戒者居生死海如蓮不染見者發心名為光也精淨華髻神以法忍無垢為清淨又得頂嚴以忍是華義故表忍也攝諸善見神表精進中精進者常攝諸根不令起見即無見不善是精進也餘六神義以次配知淨莊嚴幢等十道場神表第五具足方便住中十波羅蜜以禪波羅蜜為體道場是除蘊穢義以禪能治蘊如世間場為明禪定淨六七識之取染顯般若能開妙慧簡擇理智體之本實故禪以為場體般若以為人功普賢萬行以為䭾運至法界普光大都一切種智藏中此中十神一神為一波羅蜜為自益益人之行其義以次配寶峰光曜等十主城神表第六正心住中十波羅蜜以般若為體以空慧自在守護心城為主城神十住品正心住經云此菩薩聞十種法心定不動是申明城義善財參第六住知識海幢比丘見其端居寂默出入息盡是證此城義也寶峰光曜神表般若中檀者以法空慧至相盡處為寶峰以無性妙慧廣施含生是光曜也餘九神以次配釋略知法則如道場神主城主地等神總是女神為明慈悲故而實體中無男非女俱隨事示現普德淨華等十主地神表第七不退住中十波羅蜜以方便波羅蜜為體以大悲生育萬有性無退動為主地神寶峰開華等十主山神表第八童真住願波羅蜜中十波羅蜜以第八無功智不動為山應真自在為神布華如雲等十主林神表第九法王子住主力波羅蜜明說法如林廣多覆蔭故是法師位也吉祥等十主藥神明第十灌頂住主智波羅蜜於中十神主智波羅蜜中十波羅蜜以智能知根與法藥為神已上十衆百人寄同神位表佛自行十住一百箇波羅蜜門柔軟勝味等十主稼神表第一歡喜行檀波羅蜜中十波羅蜜如世間禾稼為資糧長養色身佛法即以十波羅蜜行為資糧長養法身令習氣漸微出世悲智習氣慣使成辨三乘說十信十住十行十回向為道前資糧初地已上為見道加行以初地始見道猶未明了此經十信中全信自心與佛無異十住初心以方便三昧見道初住已上諸住總為見道之位十行十回向十地總為加行總為資糧為資糧加行與佛因果同進故以普賢行用資悲願成滿以初住所見法身理智性果用資普賢行不屬人天有為故五位進修法身理智性果并普賢行於一真法界中互為資糧廢一即二不成為以理智佛果嚴行以行嚴果如黃瓜果華同出華果相資名佛華嚴也普發迅流等十主河神表第二饒益行戒波羅蜜中十波羅蜜善財饒益行知識釋天童子於河渚中聚沙以術利人為行明戒體此以河神為戒體前後相似普發迅流明應一乘之種普潔泉㵎主河神明應三乘及人天等善法以為戒體是普潔義若不如是行行不滿出現寶光等十主海神表第三無違逆行忍行中十波羅蜜以法性大悲以為忍體如海處其下流能容一切無明高慢生死之流皆為法流而無妨礙為無違逆行普興雲幢等十主水神表第四無屈撓行精進行中十波羅蜜以法性之水常勤精進知根而益無屈其心如水含潤隨物而益各得其所而無撓也普光𦦨藏等十主火神表第五無癡亂行禪波羅蜜中十波羅蜜以即寂而恆照即事而恆理悲智照用而無礙故火神為定體火在天為日在人為心在方為南為離神在法為虗無為中道為正為智照萬有善財南行為若此也無礙光明等十主風神表第六善現行般若波羅蜜中十波羅蜜風即辰巳之間巽神為言說為教令易巽上坤下為觀曰風行地上可以觀象大人設政教而天下從之明第六波羅蜜智慧功成善現言教教化衆生又上值角宿為天門主僧尼齊戒法則象以口為天門吐納風氣施教成化故以智為風神方者法也大象無方取其法耳淨光普照等十主空神表第七無著行方便波羅蜜中十波羅蜜一切法空能生大悲方便攝化衆生而無所著故主空神表方便也遍住一切等十主方神表第八難得行中十波羅蜜以願波羅蜜為主為智用無功其功難成故以願防之念其本願引智起行令行周遍不住涅槃不住生死以第八無功智成圓攝十方之法饒益衆生普德淨光等十主夜神表第九善法行中十波羅蜜以力波羅蜜為主明法力已成法王功辦常處生死長夜以法照明世間示現宮殿等十主晝神表第十真實行所行智波羅蜜中十波羅蜜智日恆明為晝智無為而應萬有為神示現宮殿神表智中檀者以悲宮智殿成就衆生悲智空殿展轉相益也已上十衆百人表佛十行一百箇波羅蜜門羅睺等十阿修羅王表第一救護一切衆生離衆生相回向檀波羅蜜中十波羅蜜阿修羅釋為非天雖亦天趣所攝為多諂詐無天妙樂又處大海而海水不沒像菩薩大悲方便有如諂詐雖入生死而無人天五欲之樂雖出世間而無涅槃寂滅之樂涅槃生死不住不沒咸得自在名為王也羅睺此云障明其手能障日月之明毗摩質多此云響高以與天帝戰時揚聲大呌能震山嶽為名此修羅表檀中戒者明以大悲大願音聲誓度三界六道故悲願為戒體也大速疾力等十迦樓羅王表第二不壞回向戒波羅蜜中十波羅蜜迦樓羅即金翅鳥兩翼相去三百三十六萬里於大海上以清淨目觀命盡之龍以翼簸水兩闢而搏取之顯菩薩常於生死海上以法空清淨智眼觀有根熟衆生而以止觀兩翼搏置自性清淨涅槃之岸以海不宿死尸明大悲大智性戒不宿人天三乘染淨二見死尸如金翅簸海波未合時取龍而出為速疾力也善慧光明天等十緊那羅王表第三等一切諸佛回向忍波羅蜜中十波羅蜜緊那羅此云疑神似人而頂有角口似牛人見疑之象以法忍力生於六道同行利生似凡而智如佛似聖而行同凡故表為疑神也善慧等十摩睺羅伽王表第四至一切處回向精進波羅蜜中十波羅蜜摩睺羅伽此云大蟒亦云𮌎腹行是守護伽藍神象精進四生六道無處不入利人匍匐離慢謙敬是菩薩事也毗沙門等十夜叉王表第五無盡功德藏回向禪波羅蜜中十波羅蜜夜叉此云苦活亦云伺察毗沙門天王領夜叉衆在須彌山北面象以禪定夜叉伺察守護一切衆生苦活之心令不妄起得大功德藏也毗樓博叉等十龍王表第六隨順堅固回向般若波羅蜜中十波羅蜜毗樓博叉天王領龍衆住須彌山西毗樓博叉此云種種眼象以般若種種空慧莊嚴諸見令見無著如龍遊空隱顯自在降雨潤物表空慧有無自在雨法益生龍有五種善住龍王為一切象形龍主難陀龍王為一切蛇形龍王無熱惱龍王為一切馬形龍主婆樓那龍王為一切魚形龍主摩那龍王為一切蝦蟇形龍主諸龍皆能變形唯初生時睡時瞋時行欲時不能變形諸龍皆有金翅鳥怖熱沙墮頭怖風吹寶衣露身生苦唯無熱惱龍王不以蛇形行欲又無上三種患因以名之此約三乘所說今此一乘中龍王其德並是入不思議乘佛果位中菩薩為化衆生遍於諸道普現其身令於此會賀佛出興酬其本緣寄位表法娑竭羅此云海表大悲入生死海德叉迦此云能害以其嗔時噓視人畜皆致命終亦云多舌表般若善說多法害諸煩惱增長等十鳩槃茶王表第七隨順一切衆生回向方便中十波羅蜜鳩槃茶是噉精氣鬼亦名冬瓜鬼以其陰囊大如冬瓜行則擎置肩上坐則踞之增長天王領之住須彌山南以其貪求食噉表菩薩盡與隨行斷一切貪求也持國等十乾闥婆王表第八真如相回向願波羅蜜中十波羅蜜乾闥婆此云尋香有香氣處作娛樂以求其食持國天王領之住須彌山東象以真如法界五分法身無染之香恆願娛樂衆生令其愛樂月天子表第九無縛無著解脫回向力波羅蜜以性空慧力照燭衆生淨煩惱熱令得清涼故託事於月十箇月無以次配義日天子表第十法界無量回向主智波羅蜜如日處空照臨萬有其位在上其功益下象此位其智甚高其行彌下人天神鬼外道邪行畜生地獄盡同其行如日月其形在上其功在下善惡俱照十日天子以次配智中十波羅蜜長阿含經云月上有城正方一千九百六十里二分天金一分琉璃作遙看似圓天子五百歲子孫相襲一劫日月相近光影相映即有虧盈日廣五十由旬其城正方二千四十里純金所成壽命子孫同月以風持故繞須彌山總是四天王攝已上十衆表佛自行十回向一百箇波羅蜜門釋迦因陀羅等十忉利天王表初歡喜地檀波羅蜜中十波羅蜜忉利此云三十三此天在須彌山頂其頂四埵各八輔天并帝釋天主為三十三此天身長一由旬衣長倍之而重六銖壽一千歲一日一夜當人間百年三十日為月十二月為歲帝釋亦名釋提桓亦名憍尸迦亦名釋迦因陀羅此天在山頂相盡處明從前位習氣之有為升此初地法空之際一分習氣盡故寄表此天如十住十行寄表如神十回向如王此十地如天明其進修漸漸慣習殊勝以六相十玄門該之總是一剎那中同異不可作情計也善時分等十須夜摩天王表第二離垢地夜摩此云時分以依空而居無日月天光自相照不分盡夜但蓮華開合知晝夜時分天身長二由旬衣長四由旬重三銖壽二千歲日月歲數與忉利倍此衆十天表戒中十波羅蜜以上上十善戒治欲界現行粗惑習氣三地修九次第定方無三界煩惱生如來家同如來性知足等十兜率陀天王表第三發光地忍中十波羅蜜兜率此云知足身長四由旬衣長八由旬壽四千歲日月歲數與夜摩倍最後身菩薩於此教化此地以修九次第定得出三界作鍊金不失銖兩喻明以九次第定鍊之以法眼觀之以行加之無虧本法但轉明淨善變化等十化樂天王表第四𦦨慧地十波羅蜜以精進為體此天常以變化以自悅樂表此位以三十七助道法門莊嚴慧業對治三界邪見等障鍊磨心地令更明淨用化衆生以為自樂為𦦨慧也得自在等十他化天王表第五難勝地此天依他起化以為己樂在欲界頂魔王住處明菩薩欲境難超五地以來五欲境界未全自在但為觀照諸波羅蜜修行力故不沒其中未同八地無功法流自在故以禪定為體修十諦觀治三界染淨惑障餘習得工巧明門教化衆生令他得樂以為己樂若不爾者是魔眷屬此天身長十六由旬衣長三十二由旬壽命日月歲數悉與前倍尸棄等十大梵天王表第六現前地般若中十波羅蜜梵以音語得名尸棄天王發大梵音其諸梵衆各各自謂唯與我語於大千界而最自在顏如童子身白銀色長半由旬衣如金色無男女形禪悅為食壽命一劫樂修禪寂此位以毗琉璃寶磨真金轉明淨作喻明此菩薩以十種十二緣生觀及十空三昧為毗琉璃用磨智慧轉轉明淨明觀無明成根本智更明淨也可愛樂光明等十光音天王表第七遠行地方便中十波羅蜜光音是二禪已滅憂苦出語口中光生表七地菩薩大悲行滿自苦己無常度他苦而教光破暗也清淨名稱等十遍淨天王表第八不動地願波羅蜜中十波羅蜜此三禪天禪悅喜動風災猶至表八地功用已終無功智現無生法樂智淨習氣猶在諸佛加勸令憶本願方隨智行廣利衆生愛樂法光明幢等十廣果天王表第九善慧地力波羅蜜中十波羅蜜此四禪天無出入息三災不及色果意識雖在而已無欲界意識象此地說種種法無心意識為大法師任智法明一切具足妙𦦨海等十大自在天王表第十法雲地智波羅蜜中十波羅蜜此天一衆皆勤觀察無明之法明十地無相智成緣真法執內外習亡大自在天居四禪之頂色究竟天中表十地智悲自在之極此是引進方便託事表法故攝化境界漸漸增勝如實而言一乘法界理事同參一微塵內諸佛國土人天同處身塵毛孔如影相入十玄門該之不可隨化相說已上十衆寄同天位表佛自行十地一百箇波羅蜜門如是菩薩神王諸天總明如來自行五位因果行門以智如虗空無形無色而大用遍周不往而速不來而至不作而用應物而成功號之為神以無作智性一念遍知十方同異差別而於諸境自在無礙號之為王體淨無垢非質所留礙而隱現自在號之為天是故寄位同神同天同人乃至十方異生悉同其事而非天非人非鬼神之神如佛實非牛王龍王象王但託事表法以令易解此下從大自在天王直至海月光大明菩薩等四十一衆各序所得解脫門各說十頌初頌皆純讚佛後九頌皆每頌三句讚佛一句自慶所得同佛唯海月光衆但讚佛德與自所入之法相似而總序四百二十箇解脫門四十一衆主伴四百一十人以普賢一人自得十解脫門九箇普菩薩加淨德妙光自為十人故得四百二十箇解脫門以明同得佛解脫同入佛知見以明不悟是凡悟即同佛以與後學作樣式令倣之也大自在天王至忉利天王十衆主伴百天王得百解脫門讚佛十地行果日天子至阿修羅王十衆百王得百解脫門讚佛十回向行果主晝神至主稼神十衆百神得百解脫門讚佛十行之果主藥神至海月光大明菩薩等十衆百人得百解脫門讚佛十住行果普賢一人獨入十解脫門明獨當等覺位中十法一即一切一多自在延促自由總攝之義普賢衆中九人加淨德妙光一人為十得十解脫門淨德妙光是文殊別號明等覺位中因果理智萬行圓融爾時如來師子之座一切莊嚴具中一一各出佛剎塵數菩薩其諸上首各興供雲說頌讚佛各隨方面化座而坐者明以法身為座體普賢萬行為座上莊嚴無作智為座上佛座出菩薩是古佛舊行明今佛合古行古行合今佛古今不二亦明因果不二故於本行報得果內還出本自行因之衆又座外普賢衆是佛利他之行座內之人是佛自行所契普賢之衆此之大衆古今諸佛一道無二衆生乘之即名乘如來乘至於道場以一切法皆道場也爾時佛神力故其地六種十八相震動者明常隨佛衆諸天神王衆及座內古今諸佛同因衆樹內流光衆宮殿內十悲衆當佛自衆來集得益賀佛衆心喜動故地隨動此明自衆大集一終然後面門放光普集他土亦來明無自他中之他化儀主伴龍行雲應法事合然以真法性塵剎普周一剎那中三世同際還以一多相含不同門該括如是放光集衆意令知佛境界相參無二已上是初成正覺顯示五位行門一終因果如來現相品第二如來現相者以諸菩薩及一切世間主默念佛地佛境界等三十七疑乃於供具中出聲說頌致問而如來心即知衆疑於齒間放光其光遍於十方出聲說頌雲集十方衆海是現佛境界自在相也供具說頌明心境無二以一切法總是法界不思議體也如來知衆所疑以法界心同衆生心也現齒光相以口齒是吐納言音之處表告衆令集也十方世界蒙佛光明皆有佛剎塵數菩薩從其佛所而來皆興十種世界海塵數供養雲者此他土來衆是無自他中之他以成化儀主伴其十種供養雲表十波羅蜜行也此諸菩薩身毛孔中一一各現世界海塵數光明一一光中現世界海塵數菩薩一一菩薩遍入法界安立海所有塵一一塵中悉有佛剎微塵數剎一一剎皆有三世諸佛其諸菩薩一一悉能往詣同事利生者明法界不思議體性身心境界自他無礙能同能異如帝網境界重重參映也如來眉間毫相放光名普照十方藏者明是十地菩薩智滿中道教行之光光所出衆上首名一切法勝音即是十地滿足中道果行將此中道覺行悲智圓滿法界行門毫塵剎海無障礙法答前大衆三十七問使令現在及以未來信此十地法界因果法門行滿十方咸令獲益故經云欲令一切大衆得於如來無邊境界神通力故放眉間光其光還入佛足下者足下是初信發行之際欲令大衆所信所行是佛果海理智體用不相離法也上首坐蓮華臺諸眷屬坐華鬚者表萬行主伴與前菩薩毛孔流光所出之衆相似明法界理智中圓滿自在之行無體可礙也普賢三昧品第三普賢菩薩入毗盧遮那如來藏身三昧者毗盧此云光遮那云種種遍照如來是法性之體藏身是含容衆法之智明以理智教行隨根利益三云正如寅月三陽生為正月又一止為正以一心止其道自正昧云定五蘊情識冥昧不行即真智現前故三昧是正定也普賢入者普賢三昧恆無定亂如十定品中灌頂大士起諸想念而求普賢則普賢常在三昧定亂俱真但以普賢紹佛法界大智之家為佛萬行遍周克家之長子將談佛家果海及衆生業報海故須入定以成化儀軌則也普賢入此三昧時盡法界虗空界一切國土所有微塵一一塵中有世界海塵數佛剎一切剎中有世界海塵數佛一一佛前有世界海塵數普賢皆亦入此三昧一一普賢皆有十方物現摩頂及與智者明普賢行遍周法界如天帝網光影交參重重無盡以差別智與根本智相契為十方佛現以二智相及為摩頂相印可為與智也從三昧起者以將舉佛果海及衆生海故從果體起其行用也世界成就品第四普賢菩薩舉世界海種種形狀種種依住及諸苦樂淨穢皆隨衆生自業所成衆生業轉變則剎海轉變衆生業成壞則剎海成壞衆生業染淨則剎海染淨以衆生心行無邊故諸剎海無有邊際佛菩薩於如是剎海皆以大願大悲大行及不思議變化之力而得清淨莊嚴以衆生業海無盡故佛菩薩廣大身語智行果海亦無有盡明佛菩薩普賢行海皆從衆生業行海起令諸修學之士知衆生境界即佛境界衆生心界等法界虗空界光影相入重重無礙非彼人天權學所有一異淨穢自他往來諸曲見也華藏世界品第五華藏世界者普賢菩薩舉佛五位行業報得莊嚴果海開廓衆生知見以此廣大報土是蓮華所持而含藏一切世界名為華藏也此華藏世界下有十種風輪持載者是大願波羅蜜中十波羅蜜所成之報以法身無性若無志願則一切行皆不能成如無舵舟隨波漂轉故以大願智輪持諸萬行報感風輪持諸世界也世界在蓮華藏是法身隨行無染無依智報華名種種蕊香幢是差別智不傾惑報香水海是無量無邊大慈悲報香水河是進修不息報金剛地是平等性堅固行報輪圍山是大慈防護戒行之報衆寶妙華是開敷萬行報寶樹是覆蔭衆生行報夫報不虗得故云皆是毗盧遮那如來往昔於世界海塵數佛所淨修世界海塵數大願所嚴淨也世界種者三千大千世界數至一恆河沙為一世界海海世界數至一恆河沙為一世界性性世界數至一恆河沙為一世界種此華藏中有不可說佛剎微塵數世界種最中心香水海內世界種有二十重世界上下相去各佛剎塵數世界此娑婆世界在第十三重最下第一重有一佛剎塵數世界圍繞次第增至最上第二十重有二十佛剎塵數世界圍繞此世界種外十方環列有十箇世界種亦各有二十重其高下相去其圍繞漸增悉與中心世界種同此十箇世界種外周圍有一百箇世界種此一百箇世界種內最近輪圍山十箇世界種上下略舉四重重數雖少還與二十種者高下齊等其九十箇世界種不言重數總計一百一十一箇世界種如天帝網分布而住其間重重世界如日月星等以風持載而處於空中也此諸世界種以何因者中心一箇世界種是佛根本不動智報其外十箇世界種是佛五位法門一因一果之報一一有二十重是十波羅蜜一因一果之報重重中所有佛是勝進之果次外一百箇世界種是五位中五十箇波羅蜜一因一果所成之報其內十箇世界種只四重是四攝法利生之報以四攝法即是十波羅蜜之行故還與二十重之高下齊也此華藏中雜類世界種種分別者是所攝之衆生各隨自業所成之報以衆生自業差別故同在一處而境不同衆生妄想業風所持國土與佛菩薩大願智風所持實報國土本是一土佛菩薩行遍衆生界則其報土亦自遍衆生界但由衆生行業差殊自不能見如世靈神鬼物與人同處而人不能得見也此華藏世界圓攝三世者以三世即一念一念即無念於無念中不壞諸念無時中不廢諸時故佛及衆生三世行業報境總於其中互相顯現如百千鏡四面俱懸前後影象相參徹也此華藏世界隱現自在者順法身則萬象俱寂隨智用則萬象都生隨大悲則恆居生死隨理智則生死恆真是故隱現萬端而純雜無礙也夫佛國本空而此華藏如是廣大者為二乘滯寂廢行及權教樂生他土及怖空衆生隨境存業不能解脫是故彰此福智願行廣大境界令知佛土無生無滅但為利益衆生而以本願力故常住其中毗盧遮那品第六此品來者以前五品舉現在毗盧遮那佛果恐諸後學意疑古無舊跡今何所來故此品引古佛應世道跡印今毗盧遮那出世之法相襲不異引古以成今信還以今佛之號名品還是普賢說以來文未足故此品無結終處也此上六品經有三法六周遍義毗盧遮那如來是無相法身文殊是大智普賢是大行此三法是五位進修之體其世主妙嚴品明佛智身周遍如來現相品齒光十方告衆明佛語業音聲周遍普賢三昧品明佛體用行門周遍世界成就品明佛身行周遍華藏世界品明佛智悲萬行圓滿報土周遍此品明佛無時智體三世周遍學者體此三法六周遍義信佛所行規式以成自己信心方是悟佛知見不差謬也此上說菩薩衆生染淨業報及佛報土是答前世主所疑佛海佛境界海菩薩行海波羅蜜海衆生海等默問也
