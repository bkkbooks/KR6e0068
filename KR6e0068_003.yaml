body:
  text: 唐太原長者李通玄撰明檇李比丘方澤纂入法界品第三十九入法界者後迷創達名之為入身心境界性自無依名之為法一多通徹真假是非障亡名之為界又純與智俱非情識境名為法界又達無明識種純為智用不屬迷收是無依智之境界名為法界又以智體無依無方不遍普見真俗總不思議毛孔身塵參羅衆象無邊境界佛剎重重智凡同體境像相入名為法界又以一妙音遍聞剎海以一纖毫量等無方以大小見亡物我同體識謝情滅智通無礙名為入法界此乃三世諸佛無始終之常果前五位進修皆以此為體至此慣習成滿任智施為還源舊法本無遷也世尊在室羅筏國逝多林給孤園者室羅筏亦名舍衛此云好道以國人好道得名逝多林是祗陀太子所植亦名祗陀林以佛所居而多人逝往得名給孤園是須達多長者所置以長者惠濟孤老得名園即此方之寺前諸會皆云不離菩提場普光明殿又三度在普光明殿而此法界會直言在逝多林人間之園以明前六位不離菩提之體而有進修不移根本普光明智不遷剎那之際而為智境而此法界升進已終自佛果滿如百川入海俱失本名但以無功用行任運利生故人間之園即法界智園亦以明衆生性即法界性衆生世間即正覺世間也列一百四十菩薩而都云菩薩五百人俱者十箇幢菩薩即十住中十慧菩薩以彼十住智慧摧壞煩惱至此法界果位號之為幢十箇威力菩薩即十行中十林菩薩以衆善行之力能成法界果行號為威力十箇藏菩薩即十回向中十幢菩薩以彼摧破偏見會融理智悲願能成衆德至此法界果中號之為藏十箇眼菩薩即十地中三十七箇藏菩薩以彼含藏衆德則法眼分明普見法界故此號之為眼此四十菩薩一一具有十波羅蜜是為四百次下天冠等一百菩薩是法界中根本智上十波羅蜜之行互體圓融一中具十十中具百故云五百人俱此諸菩薩皆以文殊法身根本智為體皆以普賢差別智為用以此二法總該五位及法界因果通收總別同異成壞之法故普賢文殊而為上首不思議境界經云無量菩薩現聲聞形其名曰舍利弗大目連等而下文舍利弗令海覺比丘觀文殊云云以明能隨佛行入於法界非實聲聞故云及與五百聲聞衆無量世主俱皆生佛家不斷佛種也世尊知諸大衆同時念請如來境界自在云云即入師子頻申三昧者涅槃經云師子頻申有十一事喻佛頻申三昧亦十一事一摧破魔軍詐師子故二示衆神力有十力故三示住處淨法界土故四令邪見凡夫諸獸知歸處故五怖驚羣黨故六覺悟無明眠衆生故七為行惡法獸捨放逸故八令菩薩諸獸知歸附故九調外道二乘香象令如聾盲捨憍慢故十令諸菩薩子息頓證故十一莊嚴正見四部增威為邪黨所怖故頻申表適悅無疲也入此三昧而一切世間普皆嚴淨所住樓閣廣博無際及有種種具足莊嚴者明法界境界等虗空界而一一行門具足萬行遍周剎海即上第三佛所住處淨法界土也十方世界有諸菩薩皆與塵數眷屬來集興諸供者明波羅蜜海主伴繁興亦即上第八歸附事也此逝多林有如是妙寶莊嚴一一莊嚴皆相映徹互體重重自在無礙而舍利弗等雖在林中如聾如盲不能聞見者舍利弗此云鶖子以母目明利如鶖得名目犍連此云采菽氏是菉豆仙裔迦葉此云飲光離婆多此云供養須菩提此云善現阿劣樓馱此云無滅難陀此云歡喜劫賓那此云黃色是黃頭仙裔迦栴延是一宗之姓延即胤言是其亂富樓那此云滿慈此諸聲聞既皆生佛家又與諸菩薩世主同能念請而此深法境界乃如聾盲釋有二義一約本迹就本能念就迹還迷二唯約迹理處不隔故得同疑未積大心故不聞見如葉公好龍真龍難睹不如此示不顯法真故諸大聲聞示同小乘不見不聞法界自在不思議事以令實聲聞人回心向大也普賢菩薩以種種法句及説頌開顯此師子頻呻三昧者此三昧是法界之理普賢是法界之行以行會理故屬普賢門也世尊欲令諸菩薩安住此大三昧放眉間光明普照一切國剎時諸菩薩見佛所照深入佛功德海各於其身及逝多林一切物中化現種種大莊嚴雲充滿法界而文殊菩薩説頌宣示此光所照莊嚴神通事者光明是法界行用文殊是法界理以理會行故屬文殊門以明理行主伴交參互融是入法界自在之大宅也時諸菩薩以佛三昧光明照故得無量大悲門以無量入衆生身雲周匝遍滿十方法界以無量方便法門教化調伏一切衆生而亦不離逝多林如來之所者明法界理行非一非異非合非離充遍十方而無作無動也此上為法界本門從文殊出閣後就俗利生為法界末門本不異末卷而恆舒末不異本舒而恆卷本末無礙同入法界就末開三一六千比丘會二福城東諸乘人會三善財參五十三人歷位進修弘通大教之會文殊童子出善住樓閣者草創入俗啓蒙故名文殊以為童子從根本智起利生差別智行為從樓閣出以萬行主伴翼從故與無量菩薩同行以差別行上侍衛守護之德為常隨諸天神王故主火神名智光照耀主晝神名闡明佛日也六千比丘會者捨小向大故舍利弗等出自住處頓印六位故六千為伴隨順正教入法界智故繞佛三匝而往文殊之所以正道隨處利生故觀文殊所行左右八步平坦十方常有道場隨逐法界智行威重安詳故文殊如象王回觀諸比丘以承智力執亡見謝觸處圓通故諸比丘得無礙眼三昧以皆有信種即言下成道不歷五位不離根本智起差別萬行入法界果門故皆不離文殊足下而普身十方成就佛法也福城東會者以人多修福名城以乍於諸動用中得不動智故於城東修多羅此云長行經以聞文殊法界經得萬行差別智故一萬諸龍發菩提心得不退轉以五位中五百波羅蜜門信中頓具故優婆塞優婆夷童子童女各五百人皆從城出詣文殊也善財童子弘通大教會者童從立從里言自少立志里中以法身信種為胎以七覺華具於信中為七伏藏生七寶牙信中十波羅蜜為處胎十月以五位五百行門總於信中頓印為五百寶器寶物盈滿以報非無因故文殊觀此童子知其入胎及産感生衆寶得善財名以欲令其信自性清淨覺本不動智直下無生無滅無修無證令成信位菩提故文殊為善財説諸佛法令其發菩提心以菩提心無學無修但行菩薩行對治習氣則菩提心自恆明現如雲散太空太空自空不更求空但行悲智萬行以為方便安住菩提如一切行有一不明有一不行有一取捨即有障礙即菩提心非圓滿法以菩薩行即菩提心如其不爾即是無常之行即是三乘菩提故善財既發菩提心遂問文殊云何學菩薩行修菩薩道而菩提心乃不更問以前諸會所説五位生熟升進之法未見凡夫證入欲舉善財作後學標榜并以諸師名及居處方國聖凡神王緇白外道人天男女托象表法且以南方為正為明為虗無心達虗明正智則一切處皆南背則皆北故文殊令善財南詢真善知識而讚德雲比丘之德指往參承自德雲以下展轉前指凡五十三以欲䇿進前法無滯舊聞故皆懸讚前師之德以法界中安立文殊為根本智普賢為差別智彌勒為文殊普賢中無作之果此三法成一法界體用自在門遍與五位所標五十善知識而為體用故有五十三師以五十法門皆有因果如十住十行等會皆有十菩薩十佛以標因果是為一百并法界中根本十波羅蜜故經一百一十城以文殊普賢彌勒三法但與諸勝進位作因作果而自無因果如世帝王自無階品但以威德自在隨諸有功官屬作階作品而號令之故一百一十之外無別所表以彌勒是當來佛為令後學有所憑望故捨毗盧遮那而取彌勒為所證果也五十三如左第一善財登妙峰山參德雲比丘證發心住者雲有四義普遍表定潤澤表福蔭覆表悲霔雨表智故名德雲以滅有無是非身邊諸見之諍故是比丘比丘此云息諍以無念寂靜如山則無相妙理便現以止觀力得入佛住故登山至相盡處十方觀察而求覔之別山表從方便禪門入於本無定亂之法徐步表不亂經行表不滯於定故見此比丘乃在別山除步經行以證初住生在佛家全見衆生是佛果體三界六道如光如影無實無虗性自無垢不壞肉眼見諸衆生不壞法眼境界無體不壞智眼幻生萬境見諸佛身有無自在故德雲告善財言我常見十方無量佛乃至不可説佛剎微塵數佛我知憶念諸佛境界智慧光明普見門也第二海門國見海雲比丘證治地住者以性戒如海不宿生滅死尸為海門以能即生死海為大智海而以此法恆潤衆生故名海雲以得妙峰山相盡智光用觀現行根境世間成一切智知十二緣生無明苦海全是三世諸佛廣大性海離生死海別無成佛之處故海雲言我住此國十有二年以此性海非有限量而具足智慧功德故言此海甚深甚廣而有衆寶莊嚴以諸凡夫恆以無明行識名色六入觸受之七緣為現行貪著不舍以成愛取有之三緣從此三緣成來世生與老病死之二緣為衆苦波浪所漂循環不息二乘權學却又厭而捨之不生大悲故此海雲直以根本妙慧頓照緣生體相自性無依頓為大智海也此海出大蓮華云者以智無染之行為出大蓮華尼羅此云青青為五色之首莖表根本智故以青寶為莖以行恆與智稱故華彌覆大海阿修羅在海水至半身以智行不沒生死之海故阿修羅執持其莖以智施諸性戒洗諸心垢故龍王雨以香水以無緣慈無為而應故諸神王恭敬禮拜以智無能勝為佛身高以智作用為伸右手以智行印合為摩我頂以根本智為普眼以差別智為之經普觀衆生根境而設諸教衆生無盡則教無盡故言華上有佛身極有頂即伸右手而摩我頂為我説普眼經而大海量墨須彌聚華欲書此中一品一品中一義一義中一句不得少分也於千二百歲持此經者以方便慧轉一千二百煩惱皆令得解脫也第三楞伽道海岸聚落見善住比丘證修行住者以觀十二緣竟重觀六根上現行分別習氣皆成智種不復留滯名為過六十由旬楞伽山在南海高峻難登今於生死海頓成智海已得超登之路安忍而住不被生死魔惑故至楞伽道海岸處見善住比丘也見此比丘於虗空中行者以不住三界不住出三界故於空中來往以法音普化智光破惑故諸龍王震雷激電而為供養以智悲行謙小自持故迦樓羅王作童子形婇女圍繞而共合掌以十波羅蜜利生自在故此比丘為是十王所恭敬也以入大智自在之門染淨二障不能留礙諸妄有鏡觸處消融與虗空等故言我得普速疾供養諸佛無礙解脫門一念中遍往十方佛剎而穿墻度壁入地履水皆如空也第四達里鼻茶國見彌伽長者證生貴住達里鼻茶此云消融謂從聖教消諸謬解彌伽此言雲謂含潤雨法見彌伽於市肆中千人圍繞説輪字莊嚴法門者以前三師皆比丘表出世功成出世之智不離世間故彌伽俗士入世不染故市肆中智身自在主伴交參故千人繞輪是圓轉義以一名字一音聲無自性法門與無量名字無量音聲作體即無量名字無量音聲總是一字字一音聲故一多圓轉互為莊嚴一一世間諸法悉是出世間法一一出世間法悉是世間諸法説諸法有時一一性空説諸法無時不壞衆相故真俗有無圓滿轉變互為莊嚴以一一法總別同異成壞同時圓轉莊嚴故名輪字莊嚴門以彌伽是俗身菩提心是真理俗諦要須歸順真諦故彌伽聞善財已發菩提心遽下座致禮以欲䇿令前進故告善財言我唯知此妙音陀羅尼法門陀羅尼此云總持妙音總持即輪字莊嚴門也第五住林城見解脫長者證具足方便住者以與彌伽同處俗中故不別指國以生死衆生多處智士以為禪林故言南有聚落名為住林以十二緣生而為禪體故善財遊行十有二年而至前海雲觀十二緣生得出世心此中不壞緣生不著緣生遊行是不住義以五蘊性自禪故見解脫五體投地以真俗不二故合掌以定體淵深遍周圓滿故解脫入無邊佛剎旋陀羅尼三昧而十方各現十佛剎塵諸佛道場旋與漩同漩澓是深義十是滿義以三昧中自智果佛自因行湛然皆現故長者言我入三昧時見龍自在王等十方十佛及十上首菩薩以自心應真是佛一念相應一念佛念念相應念念皆佛無心外國無心外佛故又言我若欲見安樂世界阿彌陀佛等皆隨念見以一切智悲萬行境界總是禪林性自無礙故言我唯入出此無礙莊嚴解脫門也第六閻浮提畔見海幢比丘證正心住者以至出世間智慧極畔故在閻浮提畔唯得世間出世大悲未得入俗同纏大悲故是比丘以智如海能摧諸惑故名海幢經行地是用三昧是寂表依用有寂地側表不住寂用之中而任運自在離出入息表稱理而寂稱理而用性自遍周非有入出故見此比丘在經行地側入于三昧離入出息長者居士婆羅門是世間行德行人足是行處故見此三衆從其足出周遍十方剎帝利是王種婆羅門是淨行膝是卷舒自在處以淨智自在故此二衆從其膝出腰是世間行欲之處仙絶欲人以智幻生同衆生行而自無欲故等衆生數仙人從其腰出龍表雨法潤生脅是蔭覆處故龍衆從其脅出胸是勇猛義卍從十從四周旋轉是梵行無盡義修羅是不沒義以精勤萬行不沒生死海故阿修羅衆從胸卍字中出以化衆生不捨諸乘之行而二乘背佛悲智大用故二乘衆從其背出肩是荷擔義夜叉羅剎可畏之狀是守護義以荷擔大事守護衆善故夜叉等從其肩出緊那羅乾闥婆是音樂神腹表包含衆法以恆歌咏讚揚一切佛法故緊那羅等從腹而出轉輪王有轉法輪義故從面門口間而出日輪破暗故從目出眉表中道帝釋號能主以住中道主導衆生故帝釋從其眉出以生死中智行為首故頭出諸菩薩以智果極尊故頂出諸佛明以空慧幻生諸身起化如雲充滿十方成就教化莊嚴衆生而性同虗空都無思覺故於定中現如是身雲相也又見其身一切毛孔皆出塵數光者全身總是法界無礙教光也善財住立一日乃至六月復經六日然後海幢從定出者一日一夜表檀滿七日七夜表七支戒滿半月表忍滿忍唯自利不益於他是半義一月表精進滿六月表第六住六日表第六波羅蜜成以但得清淨慈未得大悲方便同衆生行故海幢言我唯知此般若波羅蜜三昧門也第七海潮處見休捨優婆夷證不退住者以如應化生而不失時為海潮處以萬行處於生死為普莊嚴園以大悲無染為優婆夷以柔和善思現為女身而非女心以供佛利生智悲萬行所生依正故見休捨容相妙好園林宮殿池治衆物皆寶莊嚴以悲與智會故休捨言十方佛悉來處于寶座為我説法以八萬四十煩惱皆示同行而接引之達生死性與佛智性本來一性更無退怯故言八萬四千大衆皆在此園與我同行悉於菩提而得不退以於初三比丘處得出世心是一於彌伽解脫海幢處得世間出世心是二至此第七住入世行悲是三此三皆徹一切智海故言我從三十恆河沙佛所淨修梵行以能入於生死教化衆生而達生死衆生及以教化之行皆涅槃行無出無沒究竟安隱故言我唯知此離憂安隱幢也第八海潮處那羅素國見毗目瞿沙仙人證童真住者以願波羅蜜發起智業會其悲門融為一體方得無功大用廣利而無思如潮震蕩而無作故亦在海潮處那羅素此云不懶以無功智利生不懈為國毗目瞿沙此云出聲可畏以出言摧邪為仙人名以智同異道而無異見故是仙人波吒羅樹似此方楸樹尼拘律樹葉似柿葉以具智悲蔭物之德故見仙人居處林苑種種莊嚴草座鹿裘是少欲相以具萬行故仙人領徒一萬而衣鹿皮以五塵之境皆歸智地故善財五體投地以無功智無能傾動故仙人言我得無勝幢解脫以會智境遍周故仙人執善財手善財即見自身遍往十方十佛剎塵佛所以執手是加持義凡第八無功智初恐或滯寂不能任運智悲須聖加持䇿發故執其手以聖加持入法得入法後自力常然如濟河後不更負舟故放手還在本處也第九伊沙那聚落見勝熱婆羅門證法王子住者伊沙那此云長直以攝化長其直道無諸諂行為住處以智同邪力能勝諸煩惱毒熱入於神用示同外道五熱炙身而引邪徒歸於正智故婆羅門名為勝熱刀山表法力破惑火聚表金剛智光以了自性解脫力用自在無有怖畏而能照割衆生長夜煩惱故婆羅門登彼刀山投身火聚以逆境難測故勝熱勸善財登刀山入火聚而善財懷疑以是力用不思議境要須入證故諸天龍神王皆於空中讚勝熱德勸令勿疑伊那跋羅此云臭樹此龍往因損壞此樹感頭上此生臭樹故以名之以智契會即便證入故善財上刀山未至中間得善住三昧才觸火聚又得寂靜樂三昧以此一行隨諸衆生樂欲不同各見無盡差別行門一如空中所讚故言我得無盡輪解脫也第十師子奮迅城見慈行童女證灌頂住者以任運大悲而不染受生愛習為童女以悲從智生而自在無畏故父是師子幢王以此住智悲圓攝五位中智悲更無異路故五百童女而為侍從以能住佛所住包含五位佛因果門故居毗盧遮那藏殿以大悲行據一切智説五分法身香白淨教覆被衆生故坐龍勝栴檀足金線網天衣之座以此智殿悲宮是一切衆生共所入處五位菩薩共所都止故見無量衆生入王宮中以法身明淨為頗梨地以淨行住持為琉璃柱以智防護為金剛壁以戒外嚴為閻浮檀金墻以教光照俗為光明窗牖以心無垢濁報生皮膚金色以智照覆衆生報生紺青目髮等故見殿中依正如是莊嚴以一法具一切法一時會入而智境交參重重無盡故童女令善財觀而見一一壁一一柱一一鏡像中皆悉互含一切諸佛境界相也童女言此是般若波羅蜜普莊嚴門我於三十六恆河沙佛所求得各以異門入者以一位總含諸位為普莊嚴門以十住十行十回向為三十以十信是信此三法十地十一地亦只此三法慣熟更無新法以三法而成六位是為三十六以此住中通該六位一一位皆有無盡行願行相雖殊法無差別是為三十六恆河沙佛所各以異門入也右十善知識德雲明禪觀顯發自心佛智普見諸佛境界門海雲明觀生死海十二緣本來清淨佛國海門善住明法身智自在無礙出俗門彌伽明處俗修行世間文字普入門解脫明身含佛剎萬境自性禪定門海幢明出纏寂用無礙神通門休捨明處世成長大悲門毗目明無功智現同邪門勝熱明攝邪苦行門慈行明智滿悲圓總攝諸位智悲同時具足門此下建立十師自利利他十行門者十住中非不具自利利他之行但恐入於世間差別境界不能自在故須十行法門鍊磨之也十一至三目國見善見比丘證歡喜行者以智眼觀根法眼知法慧眼決擇正邪此三原一隨用名三若無三目自亦先迷何堪利物故以名國以心離世間方堪入世同光利物化令滅諍故初行即見比丘以同塵之行其多如林以入生死度諸衆生出於生死又令衆生起大悲願入於生死如是展轉猶如一燈然百千燈冥者皆明明終不盡是往返義故見其在林中經行往返以能行行故見其壯年行正故貌端順道而行故髮右旋不亂智高德滿故頂有肉髻心白智淨故皮膚金色言不妄出故頸文三道智寬見博故額廣平正善説虗無法門故唇口丹潔如頻婆果此果是南方赤色之果以智業清涼故胸題卍字七覺行滿故兩手兩肩兩足及馬王陰藏七處平滿以教漉諸衆生故其指網縵以攝生行遍故天龍八部所共圍繞以能隨根轉化方無定方法無定法故主方神隨方回轉而導引之以行無染故足行神持蓮承足以禪顯生智慧故地神現諸寶藏以高能卑如易地山為謙故須彌山神頭頂禮敬以出言典雅令人愛樂風是言教義香華是愛樂義如易風地為觀故風神雨妙香華以於生死夜中生發萬善故主夜神名以春和以初行行為年少以一行中總具十住十行十回向三法而不離八正道為三十八以此生中即是無前後始終之生中故善見言我年既少出家又近我此生中於三十八恆河沙佛所淨修梵行以一念迷亡剎那互參三世智無遠近塵中具含剎海故言或有佛所一日一夜淨修梵行乃至或有佛所至不可説劫修梵行也十二名聞國河渚中見自在主童子證饒益行者以戒香普聞名國以入自在無染之戒如河流必入智海故自在童子在河洲渚以嬉戲皆佛事故見其聚沙之戲以技藝神用入於世間而出世間為戒體如海雲以生死海即智海為戒體海船師不住此岸彼岸而運度人為戒體喜目夜神以大悲為戒體隨位升進不同智通則位位總具故自在主言我知一切工巧神通智法門得知世間書算印界處醫工農賈及練仙藥善相并隨根授法之能界謂世界處謂衆生住處書治中忘障印治不守護障醫治四大不調障工謂方伎上知天文下知地理中察人情四民所業九流所營悉善其事治入世不自在障算謂菩薩算法治取與生疑障此中所敘與阿僧祇品略同但菩薩以法算知非如彼品佛知自然知也十三海住城見具足優婆夷證無違逆行者以忍如海容受百川名城以忍中具足諸行故以名人以是忍相故見其色相端正素服垂髮以具萬行故一萬童女圍繞以法界智因陀羅網弛門小含無盡又加法界智願力廣大之心以一微塵許食令十方一切衆生食之皆得充足不減毫末以一塵食即法界量無裏外中邊限所礙食故具足言我得無盡福德藏解脫門能以一小器中飲食普施無限衆生皆令充飽以四無量心所攝故無量衆生從四門入也十四大興城見明智居士證無屈撓行者以精進大興利益名城以觀根審法為明智以居家善俗為居士以四攝七覺之行處生死闤闠而無疲故見其在市四衢坐七寶臺以精進行具衆福德斷諸苦乏故明智言我得隨意出生福德藏解脫門以財法二施皆是空無依智所生故無量衆生從種種國來各隨所欲而有求請居士仰視虗空如其所須悉從空下復為隨根而説諸法以初住創明佛慧生如來家四住治三界惑淨佛智現前生如來家八住生如來無功智家十住智悲普濟登灌頂位生如來家今第四行以觀法空門了緣生解脫治三界餘習法身智現亦為生如來家故言此會大衆已生如來家也十五師子宮城見寶髻長者證離癡亂行者以禪定無畏名城以定體遍該諸行如五住解脫長者身含塵剎以境從體為禪此第五行以體就用而諸塵境總一禪收至法之頂故名寶髻以行體寂用恆定生死市無所虧損故見其在市以禪中具十波羅蜜及八正道故其居十層樓閣宅有八門如初層施食表檀乃至最上層如來充滿表智此十層總攝五位及通收佛果以法界無依住禪為體皆以禪中十波羅蜜為莊嚴也寶髻言我因過去塵劫佛入城時奏諸音樂燒一丸香供養功德回向三處今感舍宅如是者過去塵劫表超情入定樂音表説法明因定起慧一丸香表一種定香而具五分三處謂常見佛常聞法常貧離苦言於十住中已得定體今於十行禪門得寂用自在也得無量福德寶藏解脫者以禪中具足萬行也十六藤根國見普眼長者證善現行者以般若深固徹法源底如藤根深至水際名國以智慧遍知故名普眼以慧門重重尊高難入故見其城雉堞崇峻以三空慧蕩無涯際故衢路寬平也普眼言我善療諸病者言能習世醫家亦以表法如風病表想念多者以數息治黃病表貪欲多者以不淨觀治痰熱病表愚癡多者以十二緣生觀治鬼魅病表取著妙相不離魔業及天報神通以法空觀治蠱毒病表有所得心能生諸纏害業水病是愛火病是瞋如是等病皆能以法對治之也我又善合諸香者言習世技亦以表法如智慧善説教香令熏惡業諸臭咸成智香辛頭波羅此云岸此香出信度河岸表四智河必入性海聞此智香必登彼岸阿盧那跋底香此云赤色香表虗明心境皆得解脫之香烏洛迦栴檀香烏洛迦是蛇名此蛇最毒常患毒熱以身繞栴檀樹其毒乃息表聞説無法可得之香煩惱熱息也我知令一切衆生普見諸佛歡喜門者以慧令諸境皆入佛境也十七多羅幢城見無厭足王證無著行者多羅幢此云明淨以出世明淨智慧入世行悲而觀根同事不妄接人名城無厭足梵語阿那羅以利生自在而無倦名王以萬行入世故見十千大臣共理王事以善巧方便智現逆境而治故十萬猛卒將諸惡人斬首挑目等楚毒無量也王令善財入觀宮殿勝妙莊嚴而言我知如幻解脫者明此治罰之業皆是如幻大悲自化惡人復化諸猛卒聽王處治令實衆生懼而斷惡而實不與一蚊一蟻作苦害事何況於人故感如是莊嚴明若逞情惱害衆生當淪墜矣十八妙光城見大光王證難得行者以無功智中差別妙用名城以根本無功自在智名王以治前位智悲未滿之習令平均自在方入無功妙用故經遊人間漸乃至城以無功智悲難可契會雖加觀照猶希指印故至城已向舊住人而更詢訪以具智悲差別諸行故見其地樹宮殿臺觀華池皆寶所嚴言城縱廣十由旬一由旬當此方十七里又言其城內有十億衢道一一道間無量衆生止住則非世間由旬之量所容則是根本智大城則是十度互參無盡之衢故隨衆生根業而見此城廣狹淨穢種種不同以此智王普示法則如八卦九宮皆有方法上方乾象二十八宿及十二時支干日月五星等皆昭法象人王法之以施政令覺王取以表法故善財讚王猶如虗空賢現種種法門星象以無依智入等衆生心與之同體無有別性有情無情一性無二皆隨智轉而作佛事如世帝王有道百獸率舞鳳鳥來儀匹夫至孝亦感氷池躍魚冬竹抽筍何況智徹其源行齊法界慈含萬物神會羣靈自無其心以萬物之心為心如摩尼珠以衆色為色故王入大慈順世定門而城野人衆鳥獸之屬咸來敬禮山原草樹莫不回轉池泉河海騰注王前諸天神王皆雨供也第七行與此皆王者明悲智力用隨位不同而無二道故第七第八住皆在海潮處第七第八回向則觀音正趣同會而見若女若仙若王若菩薩則力用不同之象也十九安住王都見不動優婆夷證善法行者以説法自在為王都以法力無染為不動優婆夷以智母方便之父守護心不染境謙下之悲故言身是童女而父母守護也善財入宅觸其堂宇金色光明即得五百三昧門者以悲室教光所燭得入五位五百門也入此三昧如七日胎者以智入慈柔和適悅也凡見此女皆無染心者以無愛染之業故身無淫相而令見者心皆正也不動言過去修臂佛時王名電授我為王女見佛相好而發道心爾所劫來尚不生念欲之心況行其事者以從無功智行願波羅蜜接引衆生故名修臂以智見道速疾故名電授從智修慈故為王女第八前猶染悲習今至第九染習已無故言無念欲心以法師位治説法不自在障要須無厭故言我得求一切法無厭足三昧也二十都薩羅城見出家遍行外道證真實行者都薩羅此云喜樂出生以智度圓滿普身利俗皆令喜樂以名其城以智齊佛為出家以示同邪見及三乘等盡同其事名為遍行仲尼老莊亦是其類以凡修學未入法界理事交參身土相徹十玄六相之門皆為外道今此遍行隨類益生有同外道非外道也善財中夜見城東山草樹發光如日出者生死夜中大智日也見外道山頂平坦處行者山頂表智高勝平坦表悲平等以不偏住智悲為經行也外道言我知至一切處菩薩行者以智通萬有對現色身如響應聲而非往來質也此下安立十回向者以十行雖成就世間治化藝行而未能依自佛果普賢行法界無礙門處生死海不出不沒故須十回向也二十一廣大國見鬻香長者證救護一切衆生離衆生相回向者以廣興大願名國以和合智悲理事涅槃生死染淨想念分別總成一丸而總別自在名為鬻香以入生死大悲無染故是俗士亦名青蓮華以香性無依而發善滅惡表大願無依而發行利生以根本智香王出在無明中差別智香出在萬境故長者言我知香王及一切香出處亦知調合香法也人間有香名曰象藏因龍鬪生若霑其香身則金色者表初住以止觀龍與十二緣鬪生智慧香衆生入者便成正覺也摩羅耶山有牛頭栴檀香若以塗身入火不燒者此山在南天竺境表治地住以無性之理塗瑩戒體入三毒火不能燒也海中有香名無能勝若以塗鼓其聲發時勇敵自退者表修行住法忍成就惡怨自退也如是等十種香表十住者以和融十住十行中真俗悲智二門令其自在以成回向之門此回向初入大悲之海恐遺智覺故以十香表十住法以一具諸理故以合香表之也二十二樓閣城見婆施羅船師證不壞回向者南海卑濕之地人多樓居又樓表智婆施羅此云自在以性戒大悲入生死海而得自在如船不住此岸不住彼岸及以中流而運度人故為船師以戒中主伴萬行於生死海度人故見其在海岸百千商人圍繞以生死海中湛寂不動故船師言我知海中一切寶洲以空不空如來藏為知寶處以恆沙性德為知寶類以悟佛性為知寶種以達衆生根為知寶器以依根設教令現智德為出一切寶淨土菩薩一分自在如龍以淨穢未亡為龍宮難處聲聞能空三毒為夜叉難處緣覺居涅槃海佛智不現為羅剎難處以生死海成法界門故言如是等難我悉回避以知愛取有之業為知漩澓深淺以情識想念多少為波濤遠近以愛心喜怒為水色好惡也亦知日月星宿運度漏者言達世中陰陽玄象以用利人亦表差別教行隨根成熟方法軌則歲月久近也知船鐵木堅脆機關澀滑者表根器成熟未成熟三乘回心未回心堪入生死未堪入生死也運諸商人至于寶洲採諸珍寶却將領還閻浮提者表從初住經歷諸位與其法則十地道滿至十一地送還舊住生死海中行普賢行也我得大悲幢行者大悲性戒無傾壞也二十三可樂城見無上勝長者證等一切佛回向者以長者善決斷人事又善説法令人可樂名城以忍行最勝為長者名也見其在城東無憂林中無量商人居士圍繞説法者以智發生衆善為城東以能忍則無憂而廣蔭為林以智易愚以善貿惡為商人以德化俗為居士皆法象也我知至一切處修菩薩行清淨法門者以如一切佛回向一切衆生所行無不遍也此上三師皆俗流者表回向是回真向俗也二十四輸那國迦陵林城見師子頻呻比丘尼證至一切處回向者輸那此云勇猛迦陵此云鬪爭以精進入俗滅真俗染淨二見之諍名其國城以慈行無疲為頻伸以此位同彼四住四地出三界纏生如來家是出俗相故是比丘比丘捨飾好表忍尼表慈在勝光王園王表智言此精進位和會忍智慈總攝五位之行為一法界也見其園中有一華樹如忉利天波利質多羅及見種種寶座寶地布以迦鄰陀衣者波利質多羅此云香遍此樹根華枝葉悉香遍熏忉利天迦鄰陀此云細綿衣明其依報具足也見其處種種座為種種大衆説種種法者明攝化之行直至十一地鄰佛之衆總皆遍攝以一位遍五位一一位遍法界重重磨鍊成五十三法一百一十城總別同異成壞自在無盡帝網門也善財與園中衆樹悉右繞此比丘尼者樹是行報生表衆行隨順忍智慈也比丘尼言我得成就一切智解脫者言能入普眼捨得等十般若門諸法皆壞曰捨皆成曰得即成即壞即壞即成是普眼捨得也二十五險難國見婆須蜜女證無盡功德藏回向者以此女定於汙染可畏之境令人難信故名險難以禪入於染境皆成智境以大悲處俗大智無染名寶莊嚴城婆須密此云世友以與人天而作師友女表處真不證在纏不汙示行染法而非染心示為女身而實相中非男非女但以法界悲體以為之女婆須蜜亦云易財謂現世間淫染之行以易財此乃不染而染染而不染普賢智幻境界自身如幻世間如化無心染境無境可染心無自性境亦本無此非世情思度亦非情見愚惑所行必也智徹真源行齊法界乃可體斯道也此女在市北自宅中住者表愚險闤闠生死大夜是菩薩自宅無有別宅也婆須蜜言我得離欲際解脫者以法界智王處汙無垢乍能信入即得禪悅故云暫見於我即離貪欲得歡喜三昧以從定生慧了音聲性故云暫與我語即得音聲三昧執我手是求引接義升我座是無相智增義觀我目瞬是見諦義抱我是不離義唼我唇吻是受教義以明凡所親近皆入一切智門異彼三乘但求出纏而不達法界智王處汙無垢任運利生無縛無解是永離貪欲際也又言過去佛時文殊勸我發心施一寶錢故得此解脫者文殊勸表從智生定寶錢表定能圓通諸法發心是離欲捨錢是離貪一錢雖少而能捨所重之心與多不異即是無盡功德藏也二十六善度城見瑟胝羅居士證隨順堅固一切善根回向者瑟胝羅此云包攝表智慧廣大包一切法也居士置一塔室安栴檀座而不置形象者意明諸佛衆生無生滅相方便以將栴檀座塔表示令知自身性相如座上無相本佛了性如空達相如化開佛知見無始無終無今無古故言我開塔門得佛種無盡三昧不般涅槃解脫常見十方三世佛也二十七補怛洛迦山見觀世音菩薩證隨順一切衆生回向者補怛洛迦此云小白華此山多生此華菩薩謙小悲行如之觀世音是生死海大悲利生之生與文殊法身妙理普賢智身萬行三法以成毗盧之德若翻觀自在則是觀世出世間理智自在則是第六般若門攝非此方便大悲之門故知舊經翻觀世音為是菩薩居小白華山示令衆生不作小非不棄小善也見西面巖谷中泉流瑩映樹林蓊香草柔軟右旋布地者西是殺害刑凶須行悲化之地菩薩大悲至極就物利生不居自報故處衆生巖谷穢境泉流表悲心瑩徹樹林表慈功密蔭香草表芳詞悅人右旋表衆生順化也見觀世音金剛石上結加趺坐無量菩薩坐寶石者表金剛智隨悲妙用交參而無動也菩薩言我成就大悲行解脫者明觀音是古今諸佛大悲之體故下直至十地皆不離大悲之門而此位入俗大悲成滿故云成就也正趣菩薩從空而來至輪圍山六種覆動放身光明映徹日月諸天等光皆如聚墨而詣觀音所者以正智無依故正趣從空而來輪圍山是衆生妄執報境以智現而妄謝故震動以無漏智光非世業報之光所及故如聚墨以正趣大智增明還歸悲位故詣觀音所也二十八見正趣菩薩證真如相回向者以智悲無二體故同在小白華山也正趣言我從東方妙藏世界普勝生佛所得普門述疾行解脫者以自妙理智藏無生而常生為東方妙藏世界以從根本智生差別如幻智身無來性而響應十方為普勝生佛所得速疾行也從彼發來已經塵劫一一念舉塵數步一一步過塵數佛土一一佛皆以妙具而供養者以智性自遍周不疾而述而超出情量故一念過爾所佛土以無作智印超如幻業用無功而成為妙具也二十九墮羅鉢底城見大天神證無縛無著解脫回向者墮羅鉢底此云有門以法師位有大法門開達衆生名城以智如天善惡現象賞罰應時恆應靈萬有而無思無為為天神即此界乾坤凡天地日月五星名山大川五嶽四瀆河海社稷之神皆菩薩應身非世鬼神力所能也大天長舒四手取四海水用洗面者表用四攝法審觀衆生而攝受也言成就雲網解脫者以大悲雲普雨教網漉衆生也大天示現金銀七寶及諸供具皆如山聚授與善財令以檀行攝生者明以無作智所生如幻大悲業用無窮匱也三十菩提場見安住地神證等法界無量回向者以此位會菩提理智慈悲五法為一而皆圓滿為菩提場以慈悲處下生諸法門負育衆生為地神前天神是清淨智之妙用此地神是大悲之體體恆用而恆寂故名安住天動地靜象智悲覆載含養為私而化成也見安住等百萬地神咸放光明普震大地者明悲智至此圓滿染淨業謝也安住以足按地阿僧祇寶藏自然湧出者表大悲心地之藏悉能明現任無功而神用備也我得不可壞智慧藏解脫者以悲從智起即無可壞而法界行中無智不含無悲不滿故名藏也往世塵劫以前承事諸佛得此解脫者以大悲無限雖成道般涅槃總是無始終之家事也三十一迦毗羅城見婆珊婆演底夜神證歡喜地者迦毗羅此云黃色此城因上古黃頭仙得名表智會中道為中宮福慶之色婆珊婆演底此云主當春生表主當初地出生萬行夜神表生死夜之大智自此以下九箇夜神一箇瞿波總是俗流女類表菩薩大悲如女人生養子孫而無疲倦以處靈神位中主持護祐世間雖本身不離佛會而亦不礙十方示現其身也夜神朱衣梵冠瓔珞一切星宿炳然在身者表初地通具十地之法故大悲差別智照悉圓備也夜神言我得破一切衆生癡暗法光明解脫能於夜暗密雲風雨盜賊遊行之時若山若海曠野險難處或作船師海神魚龜王王或作好鳥靈樹屋宅坦道或現日月星電令諸衆生離暗怖者明大悲行委曲周濟也言於塵劫已來常為女身修習此法者明大悲深厚不求出世以本法界中無世可出也三十二菩提場見普德淨光夜神證離垢地者處俗大悲不離本覺體故亦在菩提場也普德言我得寂靜禪樂普遊少解脫者以戒體本禪一切境界性自禪性自遍也云救護衆生一心不動修習初禪乃至息滅衆生熱惱修四禪者明法身戒體性自恆定恆隨悲用稱根攝化總皆禪門雖同禪天所修而無欣禪樂寂之心云厭離生死修三禪是譯師之誤應云性離生死修三禪也三十三菩提場右邊見喜目觀察衆生夜神證發光地者右是悲位明以菩提起行成其忍慈喜目是忍慈之相觀察是不捨衆生也夜神身一一毛孔出無量化身雲充滿十方説十波羅蜜行相者明化行無處不至云禪波羅蜜所有資具即施戒忍精進般若等一一寂靜是也復於一一毛孔出無量衆生身雲及諸天人王等相似身雲周遍十方者處處同類同事攝也如是身雲遍於一切衆生前現有情無情諸聲説自種種化生法者明法界智用有情無情同一體性故對現色身無礙無盡也云往古轉輪王即文殊覺悟我之夜神即是普賢其王寶女即我身是者表依根本智起差別用而行大悲不限時劫蓋修出世即一念現前而行大悲則無盡時也三十四此會中見普救衆生妙德夜神證𦦨慧地者此位智悲圓滿生如來家不離菩提故在此會也見其夜神於一切世界一切趣中一切時中隨諸衆生形貌言詞行解普以方便而化度者以其得普現一切世間調伏衆生解脫故也夜神舉過去圓滿清淨劫有須彌山塵數佛興時轉輪王蓮華化生王有一女即我身者以智體圓淨名劫以精進中升進差別智果為塵數佛以智無染故王從蓮生以悲智契及故王女即我也彼時蓮華十度放光令知佛出現者表十波羅蜜智成也言從過去一百一十佛所得此解脫又都舉從剎塵佛者以十地十一地互參因果為一百一十佛以智滿行遍自心如佛行總如佛見總如佛十方世界無一不佛為剎塵佛若一法一物而非佛者皆邪見也我於爾所劫爾所佛時或為夜神或為輪王乃至或為妓女者妓表法悅如是諸身皆表佛果中隨位之行所事諸佛皆表隨位之果故行果相及則諸佛自相應若離自行自果而有所見即非正見設強求而得見亦即是暫化現非實佛也三十五去此不遠見寂靜音海夜神證難勝地者此位以禪定修世工藝不離菩提體及精進行而有巧能故去此不遠寂靜是定音海是用明定體無為而響應普也此夜神是前普救夜神母者表定體能生精進之行若一切行不本於定則有疲勞時也我得念念出生廣大喜莊嚴解脫者明禪悅遍周理行互嚴利生廣大也云於往古供養不退轉法界音等十佛而得此解脫者表一地中具修十地行果而後得也次復生此娑婆世界供養迦羅鳩馱及毗盧遮那等四佛者表五地前初地至四地之果也又云於此劫中未來一切諸佛我悉供養及一切世界一劫劫中所有未來諸佛我皆供養者明禪體性圓三世一際如世水鏡空中乾體普含衆像所供諸佛是行中果設約事中亦不違此表法以所見他佛亦是自智相及自行相應乃得見耳三十六佛會中見守護一切城增長神證現前地者以護衆生心城增長菩提心內智慧之力為神名也夜神言我得甚深自在妙音解脫者明一音遍法界音無體無分別能轉一切法教化衆生以一切智慧皆現前得自在也言過世界轉塵數劫得此解脫其最初佛號法海雷音光明王其佛滅後有王出家云者以能轉變一切世間衆生微塵數差別名言總成般若言音海名為世界轉塵劫以根本智為最初佛以説法破惑自在為佛名以出纏智慧已成出纏覺觀已亡為佛滅以三空智現為王出家以空慧起出世之悲故王女亦為尼也法欲滅時千部異衆多有鬪爭將滅佛法者明空慧未具入俗大悲也又舉百佛而言我皆供養表六地中具修十地勝進互參之果而不及十一地果相者以空慧門未是普賢入纏之行故十定中三十箇空慧菩薩皆入灌頂地而不見普賢之身海幢入滅定亦表此空慧也三十七見佛會中開敷樹華夜神證遠行地者表以方便於無生死中入於生死遍行諸行以前地出纏門入纏利俗如休捨優婆夷八萬四千煩惱皆同行故名開敷樹華也夜神言我知出生廣大喜光明解脫者明四攝四無量心咸徹透也言往古法音圓滿王有五百大臣六萬婇女七百王子時王設大施會有長者女名寶光明與六十童女俱在會中其王即毗盧遮那其寶光明女即我身是者惡世苦多時表行悲之地王表智五百大臣表五位齊行六萬婇女表悲遍六道七百王子表七覺行寶光明女表悲六十童女俱會表六位之悲皆與智會其王即毗盧表智為處俗行果故毗盧佛華冠環釧亦是俗身也三十八道場中見大願精進力救護一切衆生夜神證不動地者以無功智任本願力一往利生表為神也見其坐普現一切宮殿摩尼王藏師子座者表無功智中無垢智用遍現一切處也見其現日月星宿影像身及隨衆生心普令得見諸身者智體對現也夜神言我得教化衆生令生善根解脫者以得無性之智則一切善根自然生也舉菩薩智輪如日遊空無有晝夜如幻人住世無有憂喜等喻以答其發心久近之問者明菩薩解脫非可以時量計也舉往古法輪音虗空燈王佛滿一百年坐於道場時勝光王太子善伏具二十八相救獄中罪人後五百歲中修梵行者無功智如響普照而無依以為佛一地中滿十地百波羅蜜為滿百年王表智太子表行慈行獄表慈境出家五百歲修行表出有功用家於無功用通徹五位以未滿九地十地四重因果故太子但具二十八相於三十二相中闕其四也三十九嵐毗尼園見妙德圓滿光夜神證善慧地者嵐毗尼此云樂勝是佛誕生之園以法樂衆生名園以善慧地妙慧圓滿善説教名神也舉十種受生藏生於佛家而言我從無量劫來得此自在受生解脫者言已得無功大智將及登受佛職於此地中學佛説法辨才名為處胎受生也經於百年世尊果生此園亦於三千大千世界中一一嵐毗尼園示生亦於十方一切世界一一塵中而示誕生者以從此地升於十地為經百年以無作智體如空如幻一念降靈周於法界而無彼此來往間斷之時為一切處生也諸天女等持諸供具向畢洛叉樹前候佛下生者畢洛叉此云高顯表佛之德言聖人作而萬物覩也舉往古悅樂劫中八十那由他佛出現時國王夫人與二十億婇女詣金華園攀樹而生菩薩彼時乳母即我身者以從八地無功智來為八十那由他佛以悲智二行法悅充滿為二十億婇女與王夫人俱以緣大悲而生大智故攀樹而生乳母亦悲為我身也四十迦毗羅城見瞿波女證法雲地者以黃色城表智悲二德體用遍周育載萬有而無體象戊巳土寄王四季而無專時以智悲無先後故與初地同此城中瞿波此云守護地表護大悲地是如來為太子時第三夫人表慈悲法悅非世五欲之妻下文又云久遠已來常為佛妻表智悲不相捨離夫應真智會體遍十方不可以質礙論不可以形相解現同人間示同人法現同天處與天同風地獄畜生隨類差別非可以一行知非可以一身解普賢行身法如是故約立十門以讚其德一智體無依隨器現相門二即相如影性無塵俗門三智影本無器隨心現門四智無彼此如響應緣門五衆生妄見非智有作門六智無所作隨夢幻生門七如幻生非有欲想門八如空願力十方對現門九無作大悲徹俗利生門十智通含識俗觀恆真門此十法門是瞿波之行也時普現法更光明講堂中有無憂德神與一萬主宮殿神來迎善財者一萬表萬行主宮殿神表慈悲覆護來迎表智慈相及也見瞿波有八萬四千婇女圍繞而諸婇女皆從王族生表八萬四千煩惱皆以慈悲同行而悲皆從智生也瞿波言我於過去為長者女名曰妙德時王太子名威德主即今如來我與太子成其婚禮同往見佛及聞法者表此地中智悲契合不相捨離彼時所見勝日月等五十佛表五位皆行之果其菩薩衆及天龍八部地風水火諸神表六道中祐衆生行遍也我於彼時得觀察一切菩薩三昧解脫已經塵劫猶未能盡知菩薩行者以普賢行本無有盡欲令法雲大士升入十一地普賢行門故十定中灌頂大士不見普賢之身此下十師即十一地中普賢行也四十一此世界中見摩耶夫人證從悲起智幻生成佛門者此世界中表大悲含攝之境不分遠近內外方隅摩耶此云天后表常處世間無功大悲是如來母表大悲幻生大智此法界門慣習悲智凡有八度一即第七住休捨優婆夷修習慈悲而第八住一分無功智現為從悲修智門二即第十住師子幢王女為智悲具足門三即第七行無厭足王為慈悲方便門四即第八行大光王為無功之行行悲門五即第七第八回向觀音正趣同會為悲智圓融無二門六即第七地開敷樹華神為大悲發行遍周門七即十地瞿波女為悲智圓滿普含法界門八即此佛母名為無功用慈悲起智幻生成佛入普賢行無窮門十地已前慈悲大願從根本智生有修學長養十地後一切功終純是慈悲為法界體以悲幻生對現智身利生無息為生佛也寶眼主城神勸善財守護心城蓮華妙德身衆神讚摩耶身而摩耶耳璫放光入善財頂又有守護法堂羅剎王令善財觀身觀心如夢如影而求善知識者寶眼表悲中智眼耳光表教音羅剎此云可畏表噉衆生無明三毒以此三衆之法為十一地前方便引入普賢大行中也善財受行其教即見寶蓮地湧摩耶於上現無量同衆生事業色身者明無身心自性是見悲智幻生身處也摩耶言我身相如本而能容受十佛剎塵菩薩衆海皆於腹中遊行自在或一步過三千大千世界者言普賢大悲行海廣大無盡同虗空也三世諸佛我悉為其母者任運利生之智皆從大悲母生名為生佛非必三十二相等也諸佛將成佛時皆於臍中放光照我身者臍處身分之中起氣通於上下以能生長生長是悲義表處悲中如眉光表智中也言從往古不可思議劫得此智幻解脫者明不可以久近度量須數亡情盡智現方知故唯佛能知此劫之數也此下諸師亦云我唯知此餘不能知者明同中具別非如十地已前滯障不達也四十二三十三天見正念天王女天主光證智悲自在正念諸法無失現前門者前梵行品中正念天子至此名王又有女表無念而任運智悲無方而神化自在為天為王非在處所也天女言我得無礙念解脫者言三世劫量一念了然如今現前以無念智法如是也於中劫數所有諸佛我皆供養者此是無久近中久近之狀以無時之智境一念而周不由造作也此下總是俗流不標神相異狀者表出世道滿但恐利生行不廣大不自在更無離染離淨求解脫心但乘法性船張大悲帆以大智為船師順本願風吹波羅蜜網遊生死海漉諸有著之魚置無依智岸住法界寶堂如下彌勒樓閣是也四十三迦毗羅城見遍友童子師證遍滿十方世法師範門者黃色城表不離中道軌治俗典童子師如此方仲尼仲尼頭頂下如返宇象尼丘山頂中下以為名表處卑發蒙孔子生兖州艮之分野象化小男童蒙上值角宿主衆善之門以乘角氣而生非世凡流也遍友不言而令善財往見衆藝者明師範之法正者不親教付之以助教但不決之事問之表德不孤必有鄰輔贊成其化也四十四見善知衆藝童子證遍周十方字智門者衆藝童子是遍友門人如顏回之類言得善知衆藝解脫恆唱持四十二字母入無量般若波羅蜜門以此諸字母盡攝一切文字故持一字即是持一切字持一切字即是一字是般若門也唱阿字時入菩薩威力無差別境波羅蜜門者阿此云無以達一切空無之法是菩薩威力無差別境也唱多字時入無邊差別境波羅蜜門者多是普賢差別智行境也四十五見賢勝優婆夷證世間一切正邪吉凶諸方技術師巫博説利生門者無法不了名為賢勝以其居塵利物或作博説世筮玄占未達或作良醫方藥救世不安辨寶物以定偽真刊名言而釋文義奇才果智莫不普明鬼魅衆邪皆能制伏含普賢之智海等文殊之法身佛果處躬化靈萬有無方不至無行不行如云佛以法為身通達一切法故無法不知無法不達方可為天人師若只求出世一切總無即二乘道然以法無依處身亦無依雖遍萬有而自無體故言我唯得此無依處道場解脫也四十六沃田城見堅固解脫長者證處世無著念清淨解脫門者沃田表智德潤人堅固表利生無懈以無相智莊嚴諸念即於諸法念自無著是解脫也四十七沃田城見妙月長者證處世淨智光明門者此會方便大悲與前無相解脫一體無二故亦在沃田城十住十行十回向十地則七八二位相融此十一地則六七二位一體是其升進形勢以大悲光破衆生惑是淨智光明解脫也四十八出生城見無勝軍長者證無相法中得無盡相門者以大願出生衆行名城以勝諸生死魔毛無勝軍以一切心境總是無盡佛相是無相中無盡相也四十九法聚落見最寂靜婆羅門證誠顯語門者法聚落表法師位以法界為聚落最寂靜表力波羅蜜處俗不俗處喧不喧也誠願語解脫者以一切言説皆性自真人法皆如無虗言也五十妙意華門見德生童子有德童女證智悲圓滿處世幻住門者妙意華表智中妙行童子童女表無欲無染柔和謙順而智悲均齊故如來出現品中文殊普賢亦參徹也童子童女言我等得幻住解脫者以達佛境衆生境皆智幻生住於幻境無實無虗心境都融性相無礙身土相入光影重重體徹聖凡性圓今古常住世間而無依止故又言幻境自性不思議也此下指見彌勒滿一生佛果者一生即無生之生非三世前後之生彌勒文殊普賢三法遍為五十位因果之體非於五十位外別有法來也五十一德生有德以不思議善根力令善財身柔軟光澤而指其性海岸國大莊嚴園毗盧遮那莊嚴藏廣大樓閣中見彌勒菩薩證一生所得佛果門者海岸表升進一生佛果臨於生死海岸莊嚴園表入生死智悲以嚴佛果毗此云種種光明表差別智遮那此云遍照表根本智此樓閣表法界體用普光明智成諸萬行廣利含生以故量等虗空一切世間及以衆生咸處其內同住遊止而不覺知如善財入此樓閣中所見種種世界如經具明以佛智海大悲利生大願以成樓閣住於一切衆生生死園中故云從善巧方便生從福德智慧生生無來處滅無去處皆是如幻智住生滅之相還如衆生業力生滅都無去來體相可得名為毗盧遮那莊嚴藏樓閣彌勒此云慈氏世尊授記一生補處是一生佛果蓋法界幻住智境一一國土一一塵中無盡佛海一道常然無生無沒無去來今但以普賢大行隨衆生時宜示有成佛涅槃授記未來等事故世尊化迹未終彌勒示居補處其實彌勒已與諸佛等無異也德生有德廣讚慈氏善知識德令善財親近承事而云不應以限量心行於六度住於十地淨佛國土事善知識者明六度十地皆是出世一分淨見未亡未具普賢行不同毗盧遮那佛報相果海功德身具足華冠瓔珞環釧衆相福海但得同於出世化佛捨諸飾好厭生死身是故十一地滿教令入法界門會根本果體達無明本元法界大智之境自具無邊功德報相又加普賢行願海差別智所成無限莊嚴報身而不令其住於引俗化境有限量之行門也善財於是五體投地於樓閣前以種種讚歎法讚此樓閣是具無量功德之大聖所住處者明佛果海讚歎莫盡也彌勒菩薩從別處來向大衆嘆善財德及廣讚菩提心功德者以隨俗攝化不居自報為別處來以一切神通道力菩薩萬行轉煩惱海成一切智海皆以菩提心為根本菩提心無依智亦無依一切所作皆無依住萬行如化利生如幻神通道力如空中月普現衆水皆是菩提心之功能若不依菩提心而有所得皆非自法故菩提心功德不思議也彌勒彈指出聲其樓閣門即開者彈指是去塵義聲是震動啓發義以塵去執亡即智門自開也善財入已其門還閉者以迷亡智現為開智無內外出入迷悟名為還閉言渾然還源也見其閣中廣博無量同虗空者智境無量也其中莊嚴皆寶成者智慈行願皆尊貴也其中所有神化境界及見彌勒三世行業乃至彌勒往所事佛及善知識亦為善財説諸法者以法身智境法爾恆然無物不神無法不妙是為神化境界以古今三世不移一念是故見三世事以三世性圓則熾然常説故聞往所事佛為説法也彌勒自攝神力所現境界並無者以諸法自性如夢如幻如影如像常存常泯常一常異令知真如之性法爾隨緣雖則隨緣法爾歸性也告善財言我成一切智時汝及文殊俱得見我者會三也無古今智則三世佛一時相見故言此解脫門名入三世一切境界不忘念莊嚴藏也言我於摩羅提國拘吒聚落婆羅門家生者摩羅提此云高出拘叱此云多家表智高出而行廣多且從淨種生也五十二彌勒還令善財見初友文殊者明至果同因以初信心時普光明智寂用常然之門非有古今三世始終出入故也善財經遊一百一十城到普門國欲覲文殊者一時普印前所修法是一百一十城十方諸佛及一切衆生同一法界國土是普門國是見文殊身處也文殊遙伸右手過一百一十由旬摩善財頂歎其能發如是願行為諸善友攝受乃令善財成就阿僧祇法門而令其入普賢行道場者摩頂表因果相即過一百一十由旬表已過五位因果令入普賢道場是令住佛果後普賢常行也文殊置善財於自所住處還攝不現者明佛果後不異處凡之時以成佛後佛法本無故不現也善財見大千世界塵數善知識者以法身智等周法界故普見一切皆不異於文殊體也五十三善財於金剛藏菩提場如來座前起等虗空界廣大心便見普賢於如來前坐寶蓮華座者以佛果後究竟不離初信心中金剛藏智菩提妙理而起法界因陀羅網恆行門也普賢伸右手摩善財頂善財即得一切佛剎塵三昧門如於此處摩善財頂如是十方一一世界一一塵中一切佛所普賢菩薩悉亦如是摩善財頂所得法門悉亦同者明法界恆常佛果恆常普賢之行相及相應方得諸佛已成舊果普賢舊行亦明行滿不離因時不遷智不異也善財於普賢毛孔剎中行一步過不可説剎塵世界如是而行盡未來劫猶不能知一毛孔中剎海次第剎海藏剎海差別剎海普入及剎海成壞等所有邊際乃至佛海菩薩衆海所有邊際皆不能知者普賢廣大無盡行境界法如是也當是之時善財得普賢諸行願海與普賢等與諸佛等一身充滿一切世界剎等行等正覺等神通等法輪等辨才等大慈悲等不可思議解脫自在悉同等者明無盡行海是三世十方佛所同行是究竟道更無成佛不成佛之見也刻華嚴合論纂要後序余始閲華嚴普賢三昧大疑且駭至梵行品知一切法即心自性處不覺心動它日讀李長者傳言有合論四十卷雖未獲覩實私慶焉傳曰長者諱通玄唐宗室也美鬚髯朗眉目丹唇紫肥冠樺皮衣麻長裙博袖散腰徒跣以開元七年至太原盂縣有高仙奴者異之館之齋中每旦唯食棗十顆柏葉餅一枚沉靜沖逸未嘗接人事踰三年遷馬氏古佛堂側築土室以居日常危坐又十年忽囊負經書以行行二十里偶一虎當途馴伏長者撫之曰吾將著論釋華嚴經能為擇棲止處否爰以經囊負其背而隨之至神福山原下土龕前蹲駐因取囊置龕中虎妥尾而去其龕瑩潔廣六七肘圓轉上下稱之殆天設也長者援毫心冥佛慧夜輒口出白光以代燈燭于時忽有二女子容華絶麗皆以白巾蒙首日為長者汲泉炷香奉紙墨每於卯辰間具淨饌置長者前齋訖徹器引去莫測所之凡五載論畢遂滅迹不見開元二十八年長者年九十五一日出謂里人曰汝等好住吾將歸矣遂返是晚煙雲凝布巖谷震蕩有二白鶴翔空哀唳其餘飛走悲鳴滿山翌日里人共往候之則端坐逝矣由此觀之長者蓋普光會中乘願流通人也吳興舊有論板已罹災燬諸剎印本又皆殘缺搜訪久之真如寺大宗禪老向余笑曰往吾獲一部獨見完好流虹雨菴借觀十年已久今雨菴化去門人不以歸我豈遲子耶余大喜隨償原費擔負來山中則論入經總一百二十卷琳琅煥映甫旬日而雨菴故院火鞠為煨燼矣於戲法寶住世巧有神衛若此於是洗心潛玩見長者將一切人本法界無盡藏中不動智寶圓彰頓顯𦦨涌光騰徹於言外當是時悲欣無量便欲轉似人人咸令自見𮨇聯函積几匪堪檇佩乃用節其豐詞縮其普義倣三周文勢釐為三帙名曰纂要如以尋丈之軀而臨咫尺之鏡威儀態度亦僅可觀然未緣入梓藏之篋笥垂三十年文選大夫五臺陸公道叶宗乘志深弘護昨以太常鄉還言及斯纂適符大心遂捐淨金偈成勝舉長者於公所謂千載而下旦暮之遇也昔普菴肅禪師因覽論序達本情亡知心體合大悟因言曰長者乃於經首痛下一鎚大地山河等間俱碎乃至云普賢文殊與我同參善財童子是甚茄子余謂普菴瞻前失後殊不知此中字字句句皆是長者擊情搗見之金剛杵也披文勝士奮不𮨇身衝鋒犯鋭而能別展生涯則為深報長者恩矣隆慶元年冬十月朔旦禾郡精嚴寺前住山釋方澤撰毗盧法門展一句為百千萬句亦未為廣總百千萬句以為一句亦未為略吾友無參有作廣作略之能顧皆不用獨取棗柏大士四十卷論文促為三帙廣略適中而義已備又況棗柏大士未舉筆已前底肝膽盡在其中者呼有者謂也只是箇減文字漢山僧却向它道儞未見無參在天寧漚室比丘雲東圓理跋
