body:
  text: 唐太原長者李通玄撰明擕李比丘方澤纂佛名號品第七前初會舉佛果海令諸學士信諸佛所得之法此二會之初遂舉衆生本不動智本有之法令諸學士自信自心是佛與諸佛不異此下直至如來出現品中間舉五位加行進修之法是學者自心成佛之規範也佛名號者信自法界根本智印普印一切諸法一切名言皆自體性離皆即法界性諸佛皆以稱此諸法性離之法成佛則一切法一切名言總是自法界性成正覺相如舉不動智等十佛及十住中十箇月佛十行中十箇眼佛十回向中十箇幢佛等皆是自體根本智隨行所成之號乃至於衆生界中為佛為天為神為王為人為仙遍一切處轉化衆生之身皆亦法界智對現色身之號以如是等佛名號義令諸衆生直下自信自佛不樂權教他淨土佛不滯小乘三僧祗劫所成佛也重敘菩提場始成正覺而坐普光明殿者菩提場是法界體普光明殿是法界報宅法報二體性相一真本末無異不移本處而遍諸處故重敘也諸菩薩願佛開示四種佛剎及十住十行等三十二疑念者與初會中世主疑念相似但此會要信自心是佛於自心法中應再問也四種佛剎者根本處是聖凡共住處名佛住佛剎五位中進修之法莊嚴法身智身名莊嚴佛法性佛剎示成正覺轉法輪名清淨佛所説法佛剎神通應現隨根出世名體性佛威德佛剎也世尊知諸所念即隨類為現神通者隨一切國剎一切衆生各現名號如下文殊所説佛號及五位中隨位所現行果之號是也於是十方各過十佛剎塵世界外於金色等十世界不動智等十佛所有文殊等十菩薩各與十佛剎塵菩薩俱來詣佛所各於所來之方化作蓮華藏師子之座結跏趺座者超過十使中莫知涯際之業名為過十佛剎塵世界信自法身白淨無染及法身隨行之法名為金等十色世界信自根本智及智身隨行之果名為不動等十智佛文殊此云妙德信自根本智中擇法妙慧及隨法異行之慧名為文殊等十大菩薩以智身周遍主伴無盡名為各與十佛剎塵衆俱無邊佛土不出微塵毛孔本無內外遠近去來但以昔迷為隔今悟為來而詣佛所一切諸法不離本法名為各於所來之方無染名蓮華無畏名師子含藏衆法而無染處世利人而無畏名為化作蓮華藏師子之座會萬即一而不拘散一即萬而不亂名為結跏趺座也東方金色世界不動智佛所菩薩名文殊者東方為初明為震動為春生金體白而色黃表內契無垢白法外現應真和氣黃相金位在西而云東方金色以金胞於寅胎於卯成形於辰生於巳養於午冠帶於未相於申旺於酉表信心為聖胎至初住方生佛家故東方為金色於正動中而無所動故佛號不動智一切妙行皆慧而生故文殊為諸佛母也從智南方妙色世界無礙智佛所菩薩名覺首者南方為虗無為火為日為目為文章達法虗無則法自妙故名妙色法本虗明自無留滯故佛號無礙智了諸法性超然尊貴名覺首也西方蓮華色世界滅暗智佛所菩薩名財首者西方為白虎為刑殺為昏暗於不善處而無所染名蓮華色於昏暗處而不能昧名滅暗智既不自昧則破他暗有法財利物之義名財首也北方薝葡華色世界威儀智佛所菩薩名寶首者北方為玄武為坎水坎為陷為險水外黑而內明象以明德施刑政為君就卑而潤物象設教於童蒙為師薝葡是黃色華黃是福慶之色於愚詐乖背之際以智德轉化而成福慶名薝葡華色以諸範軌引接庸凡名威儀智以貴重法普應衆求名寶首也東北方菩薩名德首者東北方為艮為山為止為小男象以莊重不遷之德啓發蒙幼也東南方菩薩名目首者東南方為巽為風化為長養萬物象智眼觀根而教化成就也西南方菩薩名勤首者西南方為坤土為信順為安靜為生育為負戴象大悲恆順好生之德荷負利生重任無疲倦也西北方菩薩名法首者西北方為乾金為剛健為君為父象以高明剛健之德君臨衆生而撫字之也下方菩薩名智首者下方為風輪風甚堅密象力波羅蜜善説諸法無摧破也上方菩薩名賢首者上方為日月星宿處空照物象智波羅蜜照明衆生最賢最勝故名賢首如是十方之義在方無方但取其法以無定法則無定方一一方法交含圓攝如云一切處金色世界一切處不動智佛一切處文殊菩薩則非世間之定方也世界皆名為色者乍信自佛之心猶是生滅色心未生佛家非能實證也舉十方各百億萬種佛名號令諸衆生各別知見者以佛名號遍一切法遍一切名字平等清淨不可取舍總是法界中諸法性離佛號皆令悟入自法界自佛知見以成信位故文殊童子説也四聖諦品第八四聖諦者諦是實義言苦集滅道四法皆實義也謂之聖者以能達苦性真了集如幻住如法住修如法道不厭不著不欣不取一如法界無去來性無住處性非如聲聞厭苦斷集慕滅修道證有得之涅槃則是苦集滅道總是一乘聖諦也舉十方世界説四聖諦各百億萬種名隨衆生心悉令調伏者明佛語業説法遍周以一切世間不離苦集一切出世間不離滅道以能總攝多法入於法界故但説四聖諦也光明覺品第九光明覺者佛以光明開覺衆生自心性光使無礙也光從世尊兩足輪下初照十方各一世界其光次第如廣乃至第十廣照十方各百億世界盡法界虗空界十方一一世界各有一大菩薩與十佛剎塵菩薩俱來詣佛所其大菩薩謂文殊等所從來國謂金色等本所事佛謂不動智等一切處文殊隨光十度加廣而十度説頌嘆佛德者足下光是初會眉間還入足下之光表所信初行之因全是中道之果其光次第廣照盡虗空界是令後學解了自心廣大境界無礙無盡一一以心光觀遍復觀能觀之心亦無內外然後以無作方便定印之入十住初心生如來智家以能開廓智境自信自心智身行身遍周無盡故云一切處金色世界一切處不動智佛一切處文殊也菩薩問明品第十問明者前品既開廣大信解於是文殊等十菩薩以各名下之法互相扣問各以自行之法説頌而答令諸學士除疑發行也十菩薩發明十信之行者文殊首問心性是一何報差殊覺首答以迷真作業全業是真知真而業謝是信位之首覺也二問業體既真何藉種種隨時之化財首答以業境本虗隨化亦假如是惠施是法財也三問平等法界何以妍𡟎苦樂不同寶首答以受因行異來悉無從知受性離是尊貴法也四問法唯一味何以説無量法門德首答以一即一切一切即一入是法門德之首也五問同於佛福田中所種福果何以不齊目首答以福果由心輕重如水因器方圓知此者是智因也六問法應均益學者何以不俱解脫勤首答以修行懈怠如少火濕薪不能然也七問受佛正法何以隨貪瞋癡法首答以多聞而不修行如説食終不飽也八問智為上首何故復讚施戒諸度智首答以隨宜説法如隨病立方是智業也九問諸佛一道何以國土壽命等有諸不同賢首答以衆生心行不同自見差別非佛有異也十者諸菩薩共問佛諸境界而文殊答以佛境界如虗空非識可識亦非心境界也此以佛之知見示令悟入以文殊妙慧不動智佛是凡聖等共有之佛也淨行品第十一淨行者前明信解此遂頓翻貪瞋癡諸見無明成其大願長養大悲一切見聞覺知皆悉清淨皆成法界智行故智首問云何得無過失身語意業等一百十問而文殊舉百四十願答之也百四十者信位通後五位隨位修道上煩惱位各二十有百二十根本十無明皆因身邊二見則有二十故以百四十願一時總防不令障道此之大願雖有為心念然十住之後萬行之海皆由此勝上緣力得成故信入者達此有為心願全是根本智中妙擇之慧動寂俱真入普賢門否則纍劫勤苦一念貪瞋一時焚盡設修無漏祗證二乘設是菩薩但生淨土無成佛緣以不入此信門也賢首品第十二賢首者深心信解常念利生為賢頓彰法界中佛文殊普賢三法無盡果行為首前五品成信位中自己解行此品舉信位中所信佛果功德無盡之行以信既成乘如來乘一往不退以信自己全身全心一切境界總是法界體用理智本無依住本無所得諸佛如影衆生如化一切語言分別如空中響應無作緣任物成聲如是之法住在何所退至何處若也有所依住放却依住即還退失以不成信故也有大自在方網三昧門入出隱現同時無礙者以任無作智隨緣普應無去來性而可取捨如響應聲如水潛流滋生卉木如春在百花如風鼓萬物以喻思之以智照之計執情亡任真理智本如是自在也此上六品十信法門皆文殊為法主者以文殊是根本智中擇法妙慧擇法既定方可行行證入佛住以十信未是證入故文殊不入三昧亦無十方佛來現在前也升須彌山頂品第十三第三會升須彌山頂者表十住法門從信升證須彌山在七重山七重海之內出水高八萬四千由旬縱廣亦爾東面黃金西面白銀南吠琉璃址是瑪瑙所成四洲在七海七山之外去須彌甚遠忉利天在山頂中即帝釋所都山似腰鼓巍然高聳非手足攀攬可登表十住生如來家非生滅心攀緣可到又方便稱性之定不沈不舉為山從定生慧頓了無明是山頂相盡處也世尊不離菩提樹下及普光明殿而升帝釋殿者明法界智身恆遍一切處無去來離向表法升進示來升也帝釋遙見佛來即莊嚴其殿安置普光明藏師子之座及設諸網帳等各十千種請佛入處者從信位來為遙見佛以方便定名為安置得佛普光明智於法自在故以名座教行漉諸衆生為網慈以護育為帳惠以覆蔭為蓋於一行中具無盡行一圓音中具差別教皆明白可觀以為繒綺萬行以嚴智境為十千珠瓔柔和忍蔽以為衣服清淨以為天子淨智自在以為梵王以真實證為佛入處也帝釋説頌歎古十佛皆曾入此殿者明十住門今佛古佛無異法也十佛者迦葉此云飲光以身光能飲諸天日月之光悉不能現拘那牟尼此云金佛迦羅鳩馱此云斷所應斷毗舍浮此云遍自在尸棄此云持髻毗婆尸此云淨觀弗沙此云增盛提舍此云説法度人波頭摩此云赤蓮第十即然燈佛也其殿忽然廣博普容諸天住處者明身心蕩然稱法界性光明朗徹無有自他表裏法如是也須彌頂上偈讚品第十四十方各過百佛剎塵世界外有法慧等十慧菩薩各與佛剎塵數菩薩俱從因陀羅華等十華世界殊特月等十月佛所而來各化作毗盧遮那藏師子之座而座者迷亡智現智境增廣為過百佛剎塵世界之外一迷一切迷一悟一切悟為各與剎塵衆俱初以佛慧證佛所住故十菩薩下名皆同為慧開敷智華住佛智家故十世界同名為華智滅煩惱身心清涼故佛同名為月轉化種種無明皆成智光遍照心境皆成無畏解脫更無散動是為化作毗盧遮那藏師子之座結跏趺坐也法慧菩薩從東方因陀羅華世界殊特月佛所來者因陀羅此云能主表初住以智行檀主攝萬行自他清涼也一切慧菩薩從南方波頭摩華世界無盡月佛所來者表二住無染戒相赫奕可觀恆清涼也勝慧菩薩從西方寶華世界不動月佛所來者表三住忍智尊貴無能撓亂使熱惱也功德慧從北方優鉢羅華世界風月佛所來者優鉢羅此云青蓮青為五色之首表四住精進以率諸行速疾成道也精進慧從東北方金剛華世界水月佛所來者表五住禪體堅固能清諸行離濁亂也善慧從東南方妙香華世界解脫月佛所來者表六住般若無相妙用普熏諸境令不著也智慧從西南方悅意華世界無上月佛所來者表七住方便隨順衆生悅從皆令入最勝道也真實慧從西北方阿盧那華世界星宿月佛所來者阿羅那此云紅蓮赤白相勻為紅赤象悲白象智表八住願由智起悲智相勻令差別境悉明朗也無上慧從下方那羅陀華世界清淨月佛所來者那羅陀此云人持此華香美人皆持佩表九住善説妙法令人持奉得淨智也堅固慧從上方虗空華世界明了月佛所來者表十住無依大智照徹萬像也世尊從足指端放光者明從十信足下之光漸上足指之端表證佛所住始發真實步也十菩薩説頌讚十住法各觀察十方者明十方同也十住品第十五法慧菩薩入無量方便三昧十方各過千佛剎塵世界有千佛剎塵諸佛同名法慧現在其前與其智力及摩頂者以從無思方便入無作真智而普淨攀緣染習名為入無量方便三昧以真入十住超勝前法為過千佛剎塵世界以與諸佛同體為同名佛來以智辨同佛為諸佛與其智力以能辨論最上之法契及於佛為摩頂也法慧從三昧起説十住二百法者每住中十法以成當位十法以為升進十住總二百也十住者一以初心入道便同佛住名發心住二以淨治心地令離惑習名治地住三以惑除進道名修行住此三種住修出世心破世間煩惱障四以三界惑淨生如來家入世間智家名生貴住治世間法則及生死煩闠不自在障五以禪門普入世間名具足方便住治真俗身邊二見及六十二見之障六以心空無礙名正心住治寂用不自在障七以煩惱無動名不退住治同行攝生不圓滿障八以無功智現清潔無染名童真住治在鄽同事世間餘習智不清淨障九以法力自在處佛儲位名法王子住治説法不自在障十以受佛智職如輪王取四海水盛貯金瓶灌太子頂方授王位名灌頂住治悲智不自在障如是十種對治皆一時一法一心一智無前後法門故法雲地受佛智職亦名灌頂菩薩其地位位皆相含攝但以治惑習氣慣練以漸而熟故須建立次第諸行位也十方各萬佛剎塵菩薩同名法慧而來作證十方世界悉亦往證者明十住盡十方土無異説也梵行品第十六梵此云淨前信位中世間智見萬法以願成為淨行此十住中以智觀察身語意及業佛法僧戒等十法如幻如夢如影如響亦如變化求其自性悉不可得令諸後學住無住之住念無念之念行無行之行利無衆生之衆生不思不惟而知萬法不造不作而亦大功是則廣興萬行而無行可得名為淨行行淨故心淨乃至衆生諸佛國土無不淨也初發心功德品第十七稱法界性無緣利物而自成就無邊莊嚴名為功德言以佛果根本不動智不思議法界乘而發其心故志願解行無分毫不與三世諸佛齊等如小流入海水性無別如輪王太子初生即具王相故初發心時便成正覺故以種種譬喻極讚發心功德與法界虗空等言發如是心住如是住非世言辨可籌量也明法品第十八明法者增明十住智德志樂使更進也六通者十方對現色身為身通常聞十方諸聲而聲塵無礙為天耳通常見十方色象而色塵無障為天眼通明知三世因果為宿命通遍知衆生心念為他心通隨智遍智諸法而無情欲滲漏之心為漏盡通也三明者宿命天眼漏盡亦名三明此之通明稱性而通稱性而明非三乘行業報得之六通三明也四無畏者一切智無畏漏盡無畏説障道無畏説盡苦道無畏也十力者是處非處力業力定力根力欲力性力一切至處道力宿命天眼漏盡力也十八不共法者身無過失口無過失念無過失想無過失心無不定無不知已捨欲無減精進無減慧無減念無減解脫無減解脫知見無減身業隨智口業隨智意業隨智智知過去及知未來現在無礙事也住於深定不沉不舉者稱真理智寂用自在離於二乘滅盡定并色無色界息慮禪為不沉亦離空觀并淨土菩薩留惑潤生等為不舉也聞諸佛土悉願往生者不出塵毛遍供十方諸佛非來往也此上六品法慧説十住法門升夜摩天宮品第十九第四會十行法門升夜摩天者此天知時分依空而住表證後依法空行行知時應物以智體遍周非有來去故諸會皆云不離菩提場而升也天王化作蓮華藏師子座者法空智行無能所心所作如化名為化作無染妙行含容衆善無畏之智恆處生死以名座也莊嚴具皆百萬計者比前會十千為升進也四種帳四種蓋皆百萬者四攝法四無量心皆無盡也嘆古十佛曾入此殿者明十行理智與古無殊此十佛還是約行外進所成之號前十住位須彌山頂所嘆十佛亦是隨位會古之號明入位古今同也夜摩天宮偈讚品第二十十方各十萬佛剎塵世界外有功德林等十林菩薩各與剎塵衆俱從親慧等十慧世界常住眼佛等十眼佛所而來各化作摩尼藏師子座坐者以行蔭衆生如林廣多衆鳥所歸故皆名林以行從慧生故名世界以佛智眼觀根利生故佛皆號眼摩尼此云離垢寶以智行無垢無畏名其座也世尊從足趺上放光者明從十住足指之光漸上足趺表行行漸高也十菩薩各説頌者各以自名下義發明十行法也十行品第二十一功德林菩薩入善思惟三昧十方各過萬佛剎塵世界有萬佛剎塵諸佛同名功德林現在其前與之智摩之頂者以離沉掉心觀察審定安立法門名善思惟了達心源無盡智行同十方佛無盡福慧為同名佛來與智摩頂也十行者一以檀行自他喜悅名歡喜行補特伽羅此云數取趣摩納婆此云少年亦曰儒童言不分別善惡老少明檀行平等二以性戒利人名饒益行三以忍行隨順名無違逆行四以勤勵自強名無屈撓行五以禪體恆明名離癡亂行六以妙慧張施名善現行七以方便利生而無所著名無若行八以無功智現名難得行九以善説法行名善法行十以智行誠諦必無謬誤名真實行如是十行總是一時一智無次第中之次第也十方各十萬佛剎塵菩薩同名功德林而來作證十方世界悉亦往證者明智行之體交參交遍法爾如是十方同也十無盡藏品第二十二十無盡藏者一以信力誠證法行無怯曰信藏此是十行位中之信非文殊覺首等十信之信二曰戒藏成就普饒益戒不受戒不住戒無悔恨戒無違諍戒不損惱戒無雜穢戒無貪求戒無過失戒無毀犯戒三曰慚藏仰慚諸佛四曰愧藏愧宿世惡五曰聞藏以多聞慧説法利生六曰施藏謂分減施竭盡施內施外施內外施一切施過去施未來施現在施究竟施七曰慧藏世出世間皆無所有而普覺悟一切衆生八曰念藏正念諸法無諸過失九曰持藏持佛法藏恆不廢忘十曰辨藏以此十法總含無盡之法名十無盡藏成前十行之行使無有盡起後十回向法使更升進令諸學士行門不滯也此上四品十行法門功德林為法主者明萬行利生是功德之林也升兜率天宮品第二十三第五會十回向法門升兜率天者此天在欲界五天之中無下夜摩忉利著樂之心無上化樂他化放逸之行欲界木六天以四王天是忉利所轄故曰五天而兜率為中表十回向大悲行門與理智均融不遍最後身菩薩所居表雖在五欲之中而於欲境無染著也世尊不離菩提場及須彌頂夜摩天而升詣者明智體無依無作而遍於十方隨感應現也遙見佛來者明從十行向十回向也敷座請佛者大悲赴俗開敷衆善也諸莊嚴皆百萬億計者大悲行門無限量也有一百八十四箇百萬億種莊嚴具莊嚴寶座寶地及虗空皆遍滿者白法布教以為金網妙行護生以為華帳尊貴智行覆生以為寶蓋以忍為鬘以戒為香戒中諸行以為粖香觀照為樓悲為宮智為殿差別智以為之閣萬行垂被為瓔珞四攝下化為瓔珞四面垂下引接滯溺為繒帶法空以為座法音和悅為鈴開敷道行為華定心不動為幢回轉不滯為幡悅可衆生以為妓樂頻婆帳此云身影此帳以光瑩應物現影得名寶悉底迦是佛胸臆德相此云樂有言有佛樂方有此相天牟陀羅即天鼓以福智大悲遍衆生界故諸莊嚴滿虗空也又有一百八箇百萬億種色類部族或合掌禮敬或持幡散供或菩薩衆中神天間錯或天衆中雜諸八部不依次第者明此位以智從悲成大悲海以無限遍周法界之行於人天六道中一時等化隨根授法或次或超或信或住或位階十地或人天諸乘非有次序也次欲色界諸天而不及無色界者以無色定沉不堪應化也又有十箇百萬億敘善根所生等者明如是莊嚴皆心行所成不虗來也先住兜率宮菩薩雨出過諸天供者本位為先住加行為新來以諸供具從法身智慧解脫知見而生為出過諸天也各各見佛如對目前者根本智相應也古十佛曾入殿者今古同也兜率天宮偈讚品第二十四金剛幢等十幢菩薩從妙寶等十妙世界無盡幢等十幢佛所來者以大悲行摧破衆生煩惱而自無動故菩薩下名皆幢以妙行利生故世界上字皆妙以生死海中智果無傾故佛號下字亦皆幢也十菩薩所表法者一以施行無盡又尊貴而不壞為無盡幢佛妙寶世界金剛幢菩薩二以大悲無相戒風悉吹香具令心平等普得安樂不被諸境所動為風幢佛妙樂世界堅固幢菩薩三以忍體無著而白淨勤勇而不息為解脫幢佛妙銀世界勇猛幢菩薩四以精進之行為世模範不虧真理發大智光為威儀幢佛妙金世界光明幢菩薩五以禪門發起利生明慧而自體無垢不虧本智為明相幢佛妙摩尼世界智幢菩薩六以常然智慧破虗妄而可貴為常幢佛妙金剛世界寶幢菩薩七以方便居塵不污而恆同事為最勝幢佛妙波頭摩華世界精進幢菩薩八以智隨願行自在利生而無染無垢為自在幢佛妙青蓮華世界離垢幢菩薩九以法力淨他令入淨戒成其差別智明為梵幢佛妙栴檀世界星宿幢菩薩十以無依妙智遍觀十方自性無有而不壞諸安立法為觀察幢佛妙香世界法幢菩薩以香無形而普熏象智也此十菩薩各化作妙寶藏師子之座而坐其身悉放百千億光者明以法寶處世無畏而智光普照也世尊從膝上放光者膝是起居回旋屈伸自在之處表十回向在生死而恆涅槃在涅槃而恆生死自在無礙也各説頌者各説一法共明十回向義也十回向品第二十五金剛幢菩薩入智光三昧十方各過十萬佛剎塵世界有十萬佛剎塵諸佛同名金剛幢現在其前與其智力加持及摩頂者大悲智光照俗俱真以名三昧超勝前位故過十萬剎塵世界一切處智身無二故同名佛來智與佛契故佛加持及摩頂也十種回向一名救護一切衆生離衆生相回向者言法身無性智體無依衆生無相正行救護而無所作也二名不壞回向者以性戒無成壞體雖隨生死不壞法身雖隨分別不壞無作雖行諸行不壞無依門也三名等一切佛回向者以法忍無貪瞋癡業諸所行願悉同諸佛也四名至一切處回向者言法身智身願身行身充滿一切世界而無去來所謂圓轉世界日月是流轉世界江河是側世界如四王天住須彌山側是覆世界胡蜂窠是也五名無盡功德藏回向者言以無盡境界為一禪門無盡衆生無明行相而為佛事承事無盡諸佛遍知無盡諸法而不壞無心是功德藏也心相本無大小計盡身為智影國土亦然智淨影明大小相入故云於一毛孔見阿僧祇佛出興於世得入法無盡藏也六名隨順堅固一切善根回向者言依慧行施以身肉手足國城妻子飲食牀座資身具等六十一種皆悉行施而恆回向隨順佛法不壞智身成就通化長大慈悲也七名等一切隨順衆生回向者言以方便大悲觀諸衆生如影如象而行惠濟為隨順衆生以衆生心差別則剎土差別故云衆生不違剎剎不違衆生以三世無體全是一際故云過去不違未來未來不違現在也八名真如相回向者言以大願興起無作真如中大智大悲大陀羅尼門大神通道力令稱真自在也九名無著無縛解脫回向者言以無依住智調和大願成就大悲利生法力觀諸佛剎衆生剎如影如化令普參入悉無礙也十名等法界無量回向者以法界無中邊無造作無來去無時分可得而回向智亦如是不思議無限量無礙自在名為等法界回向此十回向通徹前後五位但以慣習須安次第若論修行當一時齊進始得成為佛住佛行佛回向佛地也寶樹形如半月者以半月形飾其樹也八楞妙寶者八正道報也寶威儀者以寶作菩薩形而威儀庠序也寶化事者此寶能作化事化作種種事法是一智而行萬行之報也寶音者以音可寶非有質狀皆明由願起行莊嚴佛剎而普回向一切衆生皆願得是寶嚴剎也世界震動諸天興供者以得聞是大法羣心喜動而地天慶讚也十方各有百萬佛剎塵菩薩同名金剛幢來作證者明智會道同也此上三品十回向法門金剛幢為法主者明大悲智行入生死海無傾動也十地品第二十六十地者明如來普光明智以成地體如經如是菩薩已踐如來普光明地即大圓鏡智一切種一切智智十住十行十回向不離此體而道力未充更以十波羅蜜十重進修令其圓滿名為十地乃無升進中進修無層級中層級十地之體若無十信自信自心佛果不成為地十信初心若無十地十一地之果信亦無成以是始終無異之法故十住十行十回向皆有隨位進修果佛號也世尊在他化天者此天依他起化居欲界頂表為利他而修十地功終道滿行也不敘世尊升往及敷座興供等言亦不別立十方菩薩國土及本所事佛者明十地并後十一地但取十回向中理智大悲妙用蘊積使德行功熟更無異法來也金剛藏等三十七箇菩薩俱名藏者表十地俱以三十七助道法助成智悲大願含容衆德以滿無功佛德用門故名藏也一人獨名解脫月者是助道法中得法清涼之行果也悉從他方來者明從十回向法來也菩薩名蘇利耶藏等者蘇利耶此云日之照用俱蘇摩此云悅意華優鉢羅此云青蓮華也金剛藏菩薩入菩薩大智光明三昧者大智光明即是如來眉間所放十地智慧中道之光名菩薩力𦦨明亦是初會中如來眉間光名菩薩力智光總是十地道終智光今今入三昧説十地道還是此之大智光明以根本智成大悲行也金剛藏説十地名而不辨釋解脫月三度致請及佛眉間放光照及然後説十地行相者明極果大法不輕授也光灌金剛藏頂者明十地是一切智頂盡也初歡喜地者以起廣大志樂深心生如來家有多慶悅也發廣大志超凡夫地生如來家者此同初住明五位法行雖廣同是一佛智印一時同進之法故十地返成十住十行十回向法非是別有法來如從穀生苗苗還成穀如彌勒還令善財却見文殊明果不離因中之果論主頌云前後五位加行門不離十地智悲起是故十住初發心發心即入十地智猶如迅鳥飛虗空不廢遊行無所至亦如魚龍遊水中不廢常遊不離水如是五位行差別不廢差別不離智是也離五怖畏者謂不活畏惡名畏死畏惡道畏大衆威德畏也諸波羅蜜淨治諸地有總相別相同相異相成相壞相者如五位升進隨位安立十波羅蜜十菩薩十國土十佛名號總是一波羅蜜中隨行成名一中具十十中具百五位加行具有五百如是多義皆具一中名之為總其行殊途名之為別一智無二名之為同隨行報殊名之為異能成別報名之為成因果本虗名之為壞又三世久劫差別為別相以智普觀在一剎那為總相隨業長短為異相情亡見盡長短時無為同相智無依住為壞相應根與法為成相自餘諸法一一皆具此六相門又此六相互為主伴一相中有六相義十玄義亦在此通十玄謂同時具足相應門廣狹自在無礙門一多相容不同門諸法相即自在門祕密隱顯俱成門微細相容安立門因陀羅網境界門託事表法生解門十世隔法異成門主伴圓融具德門亦是其義此之六相闕一即理智不圓若人善見得智無礙總持門觀通世間一切法也以智明了粗細等世界者有形為粗無形為細如閻浮提多類雜居為亂住四王天住須彌山側為側住胡蜂等為倒住土居衆生只欲入為若入人等身中八萬四千戶蟲居隨人行動為若行水居衆生一向流去為若去各依自業互容而住為帝網差別即華藏世界也憫諸衆生墮於邪見無明憍慢渴愛諂誑慳嫉貪恚愚癡忿恨欲流有流無明流見流之十八種煩惱中不能自出即生大慈光明智者以此十八種煩惱皆依十二有支為根成八萬四千塵勞初住菩薩惡業邪見已除而習氣未盡十行十回向以法加治漸漸微薄初地正智增明已無慳嫉忿恨嗔五種習氣唯有見道隨行法執其十三種煩惱至七地悲終智滿方成隨願智用然未為斷煩惱以法執現行七地猶在法執習氣十地方無十二有支微習直至佛果方盡以此安立五位十度十十治之法則相似皆以初三波羅蜜治從纏出世之道故善財初及二三皆比丘表之次三波羅蜜治出世間世間之惑即以彌伽解脫海幢表之次方便願力三法治入世間中出世間令悲智自在即以優婆夷仙人婆羅門表之次以世間出世間智悲自在即以王女從智生悲表之五位進修位位有此四種勢分又五位升進大意有六一十住創生佛家且除正使煩惱二十行治隨世現行習惑三十回向起大願力和融智悲使世間出世間無礙利物四明十地長養蘊習悲智功圓五明十一地普賢行滿六明成佛位終如來出現如離世間品是佛果後普賢恆行法界品即明前後一部經之大體如是差別行位總在初發心住中以是一時法也見多百佛云者如二地見多千佛等皆約地地中治習增明之教均謂之多則均是身塵毛孔等周法界無盡之多非三乘情計量也多作閻浮提王者隨自修證力勢之量為世間主滿其行願如後地作諸天王俱明升進自在均謂多作則是大率非要必作如作諸天亦是第一義天一切智天非十善業報天也不離念佛法僧者以法身智行為治習之法則毗盧遮那是佛文殊是法普賢是僧自性三寶無可離也二離垢地者以修上上十善性戒體離垢也此菩薩念十惡業是三惡道因十善業是生人天三界至有頂天因上品十善畏苦修真是聲聞乘因伏盡三界煩惱入變化生死有入滅定經劫不覺又上品十善自覺緣生成獨覺乘亦得變化生死為根利故回向大菩提經十千劫又上品十善修廣大願心有限量是三乘中菩薩行因唯上上十善修佛果智成普賢行為最上乘如是念者憫衆生苦并三乘曲見以上上十善智對治欲界中隨纏煩惱普令衆生得解脫也墮於邪見等者身見邊見見取戒取并惡慧惡欲三界六道生死稠林皆因邪見而起故標為首若明諸見無體諸見即是法界緣生起唯法起見唯法見隨智而見即是佛知見也隨逐邪道者九十五種并人天魔梵三乘聖人雖苦樂不同未入法界圓門皆邪道也入魔境界者謂五蘊魔煩惱魔死魔天魔也入欲流有流無明流見流生死洄澓湍馳奔激不暇觀察者欲等四流迅速逐境從見起諸妄業無暇起觀調伏之也我慢原阜者謂憍慢慢慢過慢卑慢我慢增上慢邪慢七慢層積如原上有阜也具足一切種一切智智者加行熏修所成為一切種根本智即一切智又智即根本智所成差別之智根本智由三昧現差別智則加行觀察力修成以明若不一一加行即根本智滯寂與聲聲同也三發光地者以修色無色界八禪善達世間禪體對治三界障惑益令明淨名為發光以初地二地但治欲界煩惱而上二界息想住定障猶在此地善達八定禪體得出三界智慧光現前也修忍波羅蜜者明三地三界業惑障垂盡名為得無生忍初住得佛智慧生如來家則十行十回向總得無生法忍若論粗細進修前三賢位以佛智慧調伏名為伏忍初二三也始是順無生忍四五六地世間障亡方名得無生忍七八九地方名無功用寂滅忍也八禪定者有覺有觀離生喜樂是初禪天定無覺無觀定生喜樂是二禪定離喜住捨是三禪定苦喜憂滅捨念清淨是四禪定超一切色想住無邊虗空處是空處定超一切虗空住無邊識處是識處定超一切識處住無所有處是無所有處定超無所有處住非有想非無想是非非想處定此是三界頂此地入法界無作大定雖修八禪磨鍊三界習氣令智明淨而恆隨順法性心無所依心無所依是法界大定體也此地神通自在而不證漏盡通者明普賢行中未滿本願故也四𦦨慧地者以修三十七助道觀門觀自性無依慧光益明淨重治欲界細惑也得彼內法生如來家者以智返照無俗不真名為內法生如來家以總相言則初住初地與此地一體無二以別相升進言則初住以創開佛慧為生佛家初地以智德神通得出三界智為生佛家此地達世間智與出世間智自在無礙為生佛家也三十七助道觀者觀身內外空無性相觀受不在內外中間觀心無住觀法無我名四念觀勤行此觀名四正勤心稱所觀得法無我名四神足以得法無我故獲得信進念定慧之五根以觀達真不退為根隨行不染此五即為五力隨境不退便獲七覺分法曰念曰擇法曰精進曰喜曰捨曰猗猗是心稱理義曰定以得此七覺分便獲八正道謂正見正思惟正精進正念正定正語正業正命善能分別人天外道三乘一乘邪見正見邪定正定邪行正行品為正語善顯佛智慧業一切衆生同共有之名為正業普令人天外道世間生死及三乘出世解脫皆回向一乘無依住智為正命也修欲定斷行者以四念觀有覺有觀是欲定勤觀四念斷諸邪行為斷行也依止厭等者對治世惡法是依止厭性自無著為依止離滅諸惡法為依止滅至無依處是回向於捨也無畏者謂一切智無畏漏盡無畏説障道無畏説盡苦道之四無畏也不共法者即佛十八不共法也六十二見者謂如去不如去亦如去亦不如去非如去非不如去是過去四見邊無邊亦邊亦無邊是未來四見常無常亦常亦無常非常非無常是現在四見五蘊每蘊有四見為三十三世五蘊為六十總斷常二見為本共六十二見若以四念等觀觀之則諸見總為佛事為諸見無性總是佛知見也五難勝地者以無依無作自體之禪善知世法無定亂性復以四諦十諦并通世技妙能重治色無色界細惑下地不如為難勝也善知四諦者達苦體無苦無滅性道無生性則此四諦皆是聖諦性無二也十諦者俗諦第一義諦相諦差別諦成立諦事諦生諦盡無生諦入道智諦菩薩地次第成就乃至如來智成就諦也為利生故該習文字算數圖書印璽方藥療治淵才諷詠妓樂談説地中伏藏日月星宿鳥鳴地震夜夢吉凶身相休咎等咸善觀察無錯謬者以得稱法性禪妙用泛應動寂自在悉無礙也六現前地者以般若波羅蜜善觀十二緣生得十三昧故世間出世間一切智慧皆現前也十二緣生者曰無明曰行曰識此三為過去緣曰名色曰六入曰觸曰受曰愛曰取曰有此七為現在緣曰生曰老曰死此三為未來緣也逆觀順觀十二緣生達無生理教化衆生者夫緣生之法性自本無衆生橫計枉流生死備經諸苦不自覺知若能如理觀察離諸妄見便得識種業謝三界報亡任性緣起不沒死流對現色身應根利物是故諸大菩薩恆於法界無作自性緣起大圓明普光智中直以一切衆生生死海便為一大道場隨根隨時作佛事也凡夫無智執著於我行於邪行積集增長罪行福行不動行者罪行謂三惡道福行謂六欲天及人等諸散善福不動行謂四禪四空天及小乘三果分段生死四果并淨土菩薩變易生死諸不動行雖免粗苦未具大悲皆名邪道如是等類各隨自業積集增長一乘菩薩積集增長具佛悲智成滿菩提雖總十二緣生乘緣各差別也離我我所但有生滅猶如束蘆者明雖有分別相似生滅了中虗無如束蘆葦其相雖有而一一中虗也三苦者迷境自性攀緣不息為行苦觸受是苦更加貪戀及以憎嫌苦更加苦為苦苦從名色乃至老死是壞苦若觀緣生情有理無即三苦滅也三解脫門現前者以達緣生無性故空無自體故無相唯有無緣之悲故無願曰空曰無相曰無願是三解脫門也合空三昧者空慧之定與諸凡聖情無情合也起空三昧者動寂自在也七遠行地者以行方便波羅蜜入無量世界入無量教化衆生業以前地中三空三昧現無量無作智慧等衆生行普令遍周為遠行也修三空三昧不捨衆生者明雖證三空而大悲利生非如二乘修空自惑滅已不起智悲淨土菩薩修空滅惑願生他方聞佛教化自力成已乃還穢土始利生也雖畢竟滅煩惱𦦨而能為一切衆生起滅貪嗔癡煩惱者貪嗔癡慢疑身見邊見見取戒禁取邪見名為十煩惱亦名十使貪嗔癡慢身見邊見此六是根本煩惱餘四皆從此六生起欲界四諦上各有十煩惱并六種根本有四十六色界除瞋四諦上各有九煩惱并六根本有四十二無色界亦四十二總一百三十乃至八萬四千十使中前五名五鈍使隨行事上數生習氣為修道障後五名五利使以諸見不妄理不現前為見道障須陀洹斷見諦障盡斯陀含阿那含斷修道障總未盡阿羅漢斷三界見諦修道二障盡故不生三界三乘菩薩以空觀折伏三界十使十纏修六波羅蜜生於淨土亦云色界上別有十地報生之天名摩醯首羅無明住地亦未斷盡十纏謂無慚無愧眠悔慳嫉掉沉忿覆此十纏隨十使起亦與十使作生起因一乘菩薩從十信信自分別心即不動智佛以禪定力起無作智所有煩惱一時普印頓同智體無有三世長短延促之相亦無成佛不成佛之見但以智行對治諸惑習氣漸使微薄此地中一切煩惱全成智用故但為衆生而起滅煩惱𦦨也此地念念滿足菩提者以總相言之總是如來根本普光明智寂用無礙菩提以修進別相言之則有五十種隨行菩提約其大體但有五種一空無相菩提三乘一乘共得但大悲願行寂用不同二普光明無依住智菩提此唯一乘初發心住便成正覺但以慣習淺深安立十波羅蜜五十重升進層級三大願能起大智發生大悲利生菩提以由大願起智成悲是諸法不自生智及願行俱無自性是不從他生法無和合是不共生要因願起是不無因故云佛種從緣起而三乘人或樂空惑滯寂不入此宗故八地無功智現猶恐滯寂以願防之四大悲能隨染淨不染不淨菩提即此七地以世間出世間智悲入於世間同凡夫事圓滿普賢行門雖同俗染智無染性如蓮華在水性自無濕故恆處生死而生死恆寂非三乘積行之所能知五智非萬行圓滿無作菩提若總相門智體不異即初住十總具若別相門則十住得一分同體智門十行得一分同體行門十回向得回向大願和融智悲之門初地至六地以前三位規式長養成就出纏大智然其慈悲猶是志願此七地方始創居同俗成就處纏不汙大悲然仍有無作有作二種習氣至八九十地悲智圓滿任物利生無作方終十一地所利衆生等同法界不為而用不作而應以普光明智與一切衆生虗妄心體性無二也如二世界一染一淨是二中聞難得過者明六地純淨七地純染於二中間滯於染淨非以大方便神通願力難可越也經云超二乘者此是譯師誤題聖旨當云超過三乘初住生佛家來即超三乘但以自力未全如王太子雖超諸臣猶是王力此地如太子長大諸臣畏之是自力也八不動地者以任無功用智不思不為而應通萬有神化無方如空谷響無心而應衆音為不動也譬如比丘具足神通入滅盡定分別皆息不動地菩薩亦復如是得無功用念務皆息者此約小況大比丘神通即天耳等六通與淨土菩薩名數相似而廣狹不同以二乘通化不遍他方佛土淨土菩薩得往他方此一乘十通性自遍周十方剎土毛孔重重以智自在故也諸佛現身三加七勸者明自行無功所及法爾智現如世帝王德備自感鳳翔麟集又若不起廣大差別智業恐同滯寂故加勸也此菩薩知諸衆生心之所樂能以衆生身國土身業報身聲聞身獨覺身菩薩身如來身智身法身虗空身一一互作者以住無心想中現身同別悉自在也知如來身有菩提身願身化身力持身相好身威勢身意生身福德身法身智身者就如來身上自有此之十身以菩提心起願成身為菩提身願身隨衆生所現為化身十力所持為力持身福智萬行莊嚴為相好身示現摧伏諸我慢為威勢身逐衆生情所欲為意生身具足莊嚴為福德身體如虗空為法身知無邊法為智身也善思量相者任智所知無情識也共相不共相者三乘一乘共一無生相為共有慈悲無慈悲為不共又凡聖一體是共迷悟不同為不共也虗空身無邊相者法身起智隨行所感差別相多也童真地者無功用智始現是初童蒙入於真智無過失也生地者無功智無覺觀刺之所傷也示成正覺者入佛境界自力所持也有大勢力神通自在者七地已前是修生報業神通未得自在此地無功智報業神通廣大自在也九善慧地者位位第九為法師位此地法力成就善知衆法説法自在為善慧也如實知定不定法行者如色無色界八禪是定以有生滅亦是不定三乘出世寂滅是定以有取捨亦是不定一乘菩薩法界禪是定寂用自在故亦不定也如實知隨眠稠林者曰欲受曰瞋曰有恚曰愛曰慢曰無明曰見疑此七種恆相迷覆智境號之隨眠以多障蔽為稠林也受生稠林者一剎那中八百生滅同時起也習氣稠林者以多生習氣盤結如林此經五位法門皆是治習氣之方便如地前一分生如來家頓斷粗惑地上漸治習氣故初地明觀世法二地以戒治欲界惑習三地修八定治上二界惑習四地以助道觀重治欲界之習五地通世枝能以治上二界細惑之習六地滿出纏之智七地入利生方便八地無功現前九地行成任運十地功圓佛用總是治習法也久遠隨行相者煩惱連環也無邊引起相者識種蔓延也眠起一義者七種隨眠煩惱現行十纏十使為起煩惱眠為眠之與起體無二性故曰一義十使中貪嗔癡慢為修道障三地方除餘六為見道障六地出世智慧具足方得除也與心相應不相應相者心與境合為相應相不與境合而妄緣之是心不相應相也無記相者空無相無性無作名為聖道不與生滅和合名為正定又四聖諦為聖道修於八禪入九次第定為正定九次第定亦名滅盡定此之滅定約有四種以四諦觀識心滅現行煩惱併智都滅為聲聞滅定以十二緣滅現行煩惱併智亦滅為緣覺滅定性相空寂都無所縛行六波羅蜜生於淨土或以隨意生身住於娑婆或以一分慈悲留惑住世設入寂定但隨無相理滅為權教菩薩滅定了達根本無明即是普光明智以此為體位位增明起諸願行至寂用自在是一乘之滅定也二俱捨不定相者正邪俱捨無定無亂始應真也此地為大法師以四無礙智説一切法者總辨法身平等自性之理名法無礙智能辨諸法總別同異名義無礙智所説無謬名詞無礙智所説無斷無盡名樂説無礙智也善守護如來法藏者一乘三藏三乘三藏及仁義禮智信並是菩薩之所安立三藏即戒定慧通一切法藏也用菩薩言詞而演説者明佛為覺體體無分別所有出生滅度轉法輪等皆是菩薩事業故演説用菩薩言也衆財陀羅尼者陀羅尼是總持義明法財世財咸具足也威德陀羅尼者言持三千威儀八萬細行令諸見者悉解脫也十法雲地者大悲願力功終行滿登於法王之位以大慈悲雲於生死海雨法無盡為法雲也得一切智智受佛職者明元將一切諸佛智悲之地以作五位修行大體分分修習福德智悲並為成就此地根本智悲之地至此功滿墮在佛數名為受佛智職也得離垢三昧者明此地悉離染淨涅槃悲智功用不均平垢并下地智悲萬行未自在垢又此地無功習氣亦無故名離垢自遍周定也海印三昧者以大智海印自性圓明清淨無垢印三世境界悉周遍也一切佛現前三昧者明此離垢三昧與體性三昧並與一切諸佛同一體性也最後三昧名受職者明此地智滿行周無作大悲任運處世成就寂用無礙三昧王也受職定現前時有大蓮華忽然出生量等百萬三千大千世界者明智悲行滿法合等用法界利生無限量智悲報得其華莖臺鬚葉種種莊嚴皆是法身智身萬行報果十三千大千世界微塵數蓮華以為眷屬是一行遍一切行一切行遍一行善根報得此華是初説十信時普光明殿如來前所現之華眷屬華上諸眷屬衆是如來眉間毫中所出之衆前是舉果勸修此是智滿行終之果大菩薩坐華王上與華相稱是根本智眷屬衆生諸華是差別智也此菩薩處大華上從足至頂十處放光作諸事業者明悲智願行普周遍也足下光照大地獄及閻羅王界者極增上惡業如電激頃直往無王管攝極苦之處為大地獄有王管攝小地獄為閻羅王界明菩薩慈光無處不遍也其光還入諸佛足下者前普光明殿如來足下放光成其十信今十地道滿而光還從佛足而入以明返果還因時不移法不異因即果之因果即因之果也十方佛放光來灌此大菩薩頂者明此地佛智創現與諸佛齊而佛果智相印合也知聲聞行集者觀世間苦空無常不淨皆磨滅法修二百五十戒淨欲界苦修八禪知上二界業皆是無常入第九定身智俱盡至有頭上擊鼓不復聞聲又有厭患分段身化火自焚入變易生死是聲聞集也緣覺集者謂十二緣此四諦十二緣十地位內亦修法是一種而心量見道自逈別也知衆生業化者明衆生以自煩惱造業所有身形住處受用一一皆自業力所成更無餘物能與之也分別無分別化者謂分別此無分別之法教化衆生使開解也入如來身祕密者於身塵毛孔中現無量土無量身無量示現成佛涅槃如是一事一時同異自在十方咸然總是如來普光明智普應而無作也知佛入劫智者衆生業妄執有時劫長短菩薩以智方便破彼迷情則長短相入念劫等也入毛道智者不定性衆生輕揚如毛以方便化令生信也入示現遍行智者一切衆生及九十五種外道諸行悉與同事而轉化也入示現逆行智者示作魔王惱惑行人意使堅固及行非道無不利生如作阿闍王弒父事等使知得道則業除也世間了知不了知智者或令人了知是聖或不令人了知是聖是凡也此菩薩一念頃悉能領受十方佛大法明大法照大法雨者十方世界出生法無不總知總解為大法明一切衆生根業好惡無有不見為大法照隨衆生根一時等雨法雨為大法雨以智齊佛故一念頃悉能受也此菩薩隨心念力神通德用悉自在者如人天六道一切衆生業報境界一依心造此菩薩以無作法身大智之力隨所心念莫不十方一時自在皆悉知見以稱性無依等虗空量普光明智體周滿十方以無性智大用隨念以不忘失智隨念皆成以具總別智總別同異成壞皆作以廣狹大小自在智化通無礙以與一切衆生同體智能變衆生境界純為淨利以自他無礙智一身而作多身多身而作一身以法界離量智能於毛孔廣容佛剎以等虗空無邊無方之智而一念現生滿十方而無去來以如響智而能響應等現等衆生形以具足圓滿福德智能與衆生同居而恆住妙剎若非聖所加持衆生不見如是智力神通雖等虗空無體性如隋意摩尼雖性無能所無造作而與一切衆境同色非如虗空但廣大而無用也金剛藏菩薩入一切佛土體性三支行恆處生死差別利生為七十異名總明八地九地十地十一地乃至佛果位而常不廢七地已前三空七覺之方便也普賢菩薩入師子奮迅定而普眼菩薩三入三昧渴仰求覔竟不得見普賢身者普賢以法身根本智純成處生死中差別大智行門常居大行智海與一切衆生無邊想念齊興普用如師子奮迅時全身諸毛一時普震名為大用定海非可以入出三昧求覔而普眼雖登法雲灌頂位猶是十地前自利利多之普賢行未是十一地後純處生死大用之普賢行故不得見也佛言普賢現近我坐初無動移者明不離根本智而有大用也普眼承旨即與無量想念乃見普賢於佛前坐蓮華座或從他方世界相續而來者普賢行身猶如虗空無造作無去來無生滅猶如谷響但有應物之音而無處所如幻術文字求其體性了不可得而想念之體亦無處所可得全體是普賢身故興想念時即普賢現身時也佛自説十定名普賢説十定用者佛是根本定普賢是差別智用也十定一名普光大定者正智遍周照迷破惑也云以三千大千世界為一蓮華現身坐此華上身中復現三千大千世界其中有百億四天下一一四天下現百億身一一身入百億百億三千大千世界者明法身無相理所現世間報境及世間法皆如影像重重不礙也云羅睺阿修羅王本身長七千由旬化形長十六萬八千由旬於大海出其半身須彌山齊然不壞本身相者言修羅尚爾何況菩薩了心如幻了世如夢而不能現本法界自在神力也二名妙光明定者以根本智為體如幻智為用以根本故多入一中以如幻故一現多境一多自在自他相入為妙光也七金山日影喻此定者七金山即十地品末所列除雪山香山須彌山耳重重影現喻帝網身土互相涉入不住不離若住則不能相入若離則無相可入若住世間內則不能身包世界若住世界外則不能遍入世間也光色世界者日月星是帝王宰輔人衆共業所化以有天住其中故名世界也三名次第遍往諸佛國土定者以智用自體遍周即神通遍周如空谷響應擊成音自無能所造作也四名清淨深心行定者以無量供具供無量佛然於諸佛出興入滅如𦦨如幻了不可得雖則如𦦨如幻然見佛聞法皆憶持不忘而普為衆生説如是法也五名知過去莊嚴藏定者一念中入過去不可説劫中佛出興國土莊嚴次第法亦根本智中具差別智也如歌羅邏入胎時一念間識則托生者歌羅邏此云薄酪初受胎相喻極速也六名智光明藏定者能知未來一切劫中佛出現等事一念悉含諸剎為藏也七了知一切世界佛莊嚴定者悉入十方悉見諸佛教化莊嚴事也八一切衆生差別身定者一身入定多身起多身入定一身起一多自他同異皆自在也九法界自在定者一毛孔中虗空無大小量即與無盡虗空等故於一毛孔中入定自然能知一切世間及世間法悉盡無遺以稱法界智無小大內外量也香山頂上無熱惱池流出四河東名私陀入震旦達于東海即此方黃河之源南名恆伽即恆河入南印度達于南海西信度河達于西海北縛芻河達于北海者池表菩提心四河入海表四智河入佛智海也十無礙輪定者明悲智願行神通道力滿衆生界無有休息不離一念遍入三世不離毛孔等周十方也伊羅鉢那象王住金脅山窟中知帝釋意即於窟沒於天上出於象身化作種種樂具載帝釋王至園遊觀復自化身與諸天同其形相而共娛樂帝釋欲還復作象身載送還宮而於窟住者伊羅鉢那此云香葉窟旁多香葉樹故名其象金脅山即第一金山之脅此喻菩薩雖入佛位同於諸佛終不棄捨菩薩度衆生行如象王雖能化身同於諸天而常不失象王本身為釋王天之所乘也十通品第二十八十通者從十八定起十種不思議因陀羅網境界無作無礙利生自在神通一以盡知諸心名他心智神通二以盡見十方名天眼智神通天即第一義天一切智天之天非如阿那律但觀三千大千世界如觀掌中菴摩勒果三乘天眼之天三以盡知過去名宿住智神通四名知盡未來際劫智神通五以盡聞十方名無礙清淨天耳智神通六以不動本處而遍十方名住無體性智神通七名善分別一切言詞智神通八名現無數色身智神通九以差別智用名一切法智神通十以不廢大智大悲利生大用而恆在大定名一切法滅盡三昧智神通如光影之應現也十忍品第二十九十忍者以神智通達而成十種法忍一以聞佛所説不驚不怖名音聲忍二以深冥法性隨順了知名順忍三以諸法都寂智照湛然名無生忍四以諸法生起而無起相名如幻忍譬如以巾幻成一馬巾喻法性原非是馬幻術喻業惑用有體無馬喻依他起法相有實無故馬生即是不生馬即是巾諸境界相全即智體故名如幻五以境無境相名如𦦨忍六以知無知相名如夢忍七以聞無聞相名如響忍八以現無現相名如影忍如水中月不漂不沉喻菩薩同世遷流不漂生死證真寂滅不沉涅槃故名如影九以有無有相名如化忍譬如化人非凡非聖非有非無非世間生非世間滅等故名如化以如化忍了諸法相悉皆如化十以菩薩智行無依無住無障無礙不可破壞無有限量名如空忍也十定十通十忍皆普賢説者以此三法是十一地等覺位中入生死海方便大悲一德之功用亦是五位菩薩所共修習無前後無窮盡法門故屬普賢也阿僧祇品第三十阿僧祇品繼十定十通十忍之後者以十定十通十忍已滿十一地行自阿僧祇品至如來出現品凡八品總明佛果中三業廣大自在法也此廣大數法并隨好光明法為佛果二愚而佛自説者明雖入等覺位若不能以智眼知此廣大數法及隨好功德多少之量則猶有此二障故名二愚唯佛差別智滿方能洞了故佛自説此廣大數法是佛心業自在法門故心王菩薩問也洛叉此云億俱胝此云兆此方黃帝算法自一至十百千萬億兆京垓𥞑壤溝澗正載凡二十三從壤已去有三等數法其下者十十變之中者萬萬變之上者億億變之此品用上等數法故云俱胝俱胝為一阿庾多等直至不可説不可説轉凡百二十大數以為一終者長行述能數之數廣多偈頌顯所數之德無盡總明佛果普賢行願虗空不可量劫塵不可比廣大無限世數莫及矣如來壽量品第三十一此品舉佛壽命自在而心王菩薩説者以佛心王之命隨根延促任物自在如根本智無生滅長短來去佛壽命亦無生滅長短來去而隨物長短也菩薩住處品第三十二此品舉菩薩住處亦心王説者明佛以菩薩攝持世間之行住於諸處住處雖有所依化行無方不至而住持自在故屬心王震旦或云真丹亦云支那此云思慮以此國人多所思慮即禹貢內地迦葉彌羅即罽賓國清涼山文殊與一萬菩薩同住即五臺山舉閻浮提人中海中諸處餘三天下例然經文闕也佛不思議法品第三十三不思議法者想心不及為不思名言不及為不議明佛身口智三業廣大自在任性遍周不為而應非情識所思慮議論也此品以大衆思惟佛十種不思議法而青蓮華藏菩薩知其心念舉佛國土身眼耳鼻等三十二種普周法門告蓮華藏菩薩者青為五色之首以根本智圓明無染名青蓮華藏以差別智一切無染名蓮華藏以佛三業廣大之用一業演十為三十以三十積不離真俗二諦為三十二以此三十二種一一演十成三百二十種因陀羅網互參法門意明佛三業大用真俗三法百千萬乃至不可説至此皆滿故佛號兩足尊以青蓮華藏表真智蓮華藏表俗智故此二人自相論説自己不思議廣大法門凡三百二十種也毗舍闍是鬼趣此云噉精氣如來十身相海品第三十四十身相海者三十二相屬化身佛以形色言八萬四千相屬報身佛以定慧言此無盡相海屬十身以是佛之廣大利生遍周圓滿普賢無盡大行報得十華藏世界微塵數莊嚴福相身故名十身相海還是普賢説也初舉頂上三十二種寶莊嚴大人相者萬善根海皆以三業二智為體故感招報相之首以嚴佛頂也通頂及身略舉九十七種大人相者以能淨三界九品煩惱於九品煩惱上各成十波羅蜜行海故報生九十種大人之相以七覺助道方便共成九十七種大人相也九品煩惱者欲界一品色界四禪四品無色界四禪四品是為九也如來隨好光明功德品第三十五隨好光明者隨是無依止義是佛自果無依大智清淨功德所成相好光明以阿僧祇品因終隨好果極故皆佛自説又好劣於相而有如是難思之用則相之用彌更難思恐物不信亦須自説以寶手表法身妙慧性光引接衆生故告寶手菩薩也舉為菩薩時足下隨好名圓滿王常放四十種光中有一光名清淨功德阿鼻地獄衆生蒙光息苦生兜率天聞天鼓出聲種種勸誡及説種種真實懺悔心即解脫得十地者如佛化身三十二相有八十種隨好今佛十華藏世界塵數相則其隨好彌多故略舉一好一好但説其劣故舉足下足下一好復有多光其四十種光表信住行向四位智行之光以十地但成四位之功不別有法故不及之佛之果光復不可説故舉菩薩因光因中多光但舉其一以是離垢無依智印所成而普照自在為圓滿王為清淨功德地獄衆生以宿親近善友修十信心以不專修還作惡業隨極苦獄以宿信種不壞光及其身以光威力息苦生天若無信種縱有光照亦不覺知復因信力及毗盧遮那菩薩三昧中無作自在妙慧之力得聞無形天鼓無作妙聲諸所勸誡諸所實相懺悔法門頓滅罪障登十地也八萬四千煩惱者十煩惱中一一互參具十成一百煩惱受想行識及意為五蘊此一百煩惱一一具有五陰成五百煩惱色聲香味觸為五塵五蔭緣於五塵互為主伴成一千煩惱皆以末那識與六識相因而造成為七千以三世流轉相因則三七成二萬一千貪行多者二萬一千嗔行多者二萬一千癡行多者二萬一千貪嗔癡等分者二萬一千是為八萬四千以一念成則三世俱成一煩惱成則八萬四千煩惱隨成也諸天子承天鼓教知恩報恩持諸香華供養毗盧遮那菩薩蒙香衆生亦得消滅八萬四千煩惱成就香幢雲自在光明乃至見其蓋者種金網轉輪王恆河沙善根住此轉輪王位放大光明衆生遇光皆得十地者明隨好光明種種利生廣大自在初諸天子聞天鼓説法得十地果二以見其華蓋得金網轉輪王位而於百千億那由他佛剎塵數世界教化衆生亦是十地三以衆生遇此輪王放光亦得十地此三種十地齊等法門各與塵數多類同時類成總是一隨好中一光之力餘好餘光所有力能彌更多也此之光明神通自在者此中雖不論神通然大智現前大悲大願法爾應得神通變化以為利生權便如人十善生天亦得天中通化況菩薩也普賢行品第三十六普賢行者一行遍一切行而恆不雜一切行即是一行而恆不殊如錦衆縷成文縷縷色異縷縷皆錦非是錦外之縷亦非縷外別有其錦此品繼隨好光明者言既有極果性智之光必有處俗之行理行體徹方成不二自在之門故普賢説也菩薩於他菩薩起一念瞋心即成就百萬障門者以瞋興道甚相違背令諸菩薩慎防護也略舉一百障門云作惡神惡鬼障者以得一分求道之念助成勢力故隨惡神鬼中怒不可當也知衆生心行智者此名他心智以自無心自他障絶即自心與衆生無二以此能知他心乃至諸佛妙理亦以無心契同無自他遠近即智遍十方而無來往即對現色身應根説法即一身多身相入自在故曰少作功力疾成正覺也十方各過十不可説佛剎塵數世界外有十佛剎塵數同名普賢菩薩各從普勝世界普幢自在佛所來此作證十方一切世界悉亦往證者普賢無盡無二之行至此皆滿故同名普賢來此作證充滿十方處道謙和為普勝世界能破自他憍慢及諸煩惱號之普幢雖居生死不與染俱名為自在普賢大行法則皆同故云於一切處悉演此法也頌云佛説衆生説及以國土説三世如是説種種悉了知者明普賢之行盡三際遍十方若自若他若凡若聖一一宣明無隱覆也如來出現品第三十七如來出現者以文殊是法身妙理根本智慧之門普賢是差別智行大悲之門若無普賢則理智滯於空寂若無文殊則諸行入於無常須此二門參徹方名為佛五位進修至此二法圓滿自佛出現如善財參德生童子有德童女表智悲行滿便見彌勒如來亦是此義故如來於眉間放中道果光入性起妙德菩薩頂令問自佛果極至頂法門又放口中教光灌普賢口念説自佛果極差別萬行智悲圓滿之法性超妙德是文殊別號從十信以來皆亦遊履文殊普賢二法但以至此和會方熟然法界中時不動智不動行不動法會常然是故從説十信以來或升天表法或身遍十方終不離普光明殿本智之體一剎那際而此品自果已終之法還於普光明殿中説如善財參彌勒佛後却見初友文殊却入普賢身中是也如來出現有十無量法第一有十種出現因緣者一以大千興造喻佛出現衆緣所成二以洪霪大千喻佛出現法門廣大難知三以雲雨無從喻出現機感而現無所從來四以大雨難知喻非大機不知五以大雨成敗喻滅惑成德六以一雨隨別喻一味法隨器差殊七以勝處先成喻佛勝緣先濟八以事別由因喻佛德殊由智九以四輪相依喻佛慈悲負載如地方便隨器如水十力能持如風無依無礙則如空輪十以大千饒益喻佛利生德別而皆被也第二有十種身者一以虗空周遍喻法身周遍十方法身無身無所去至無去至故無所不至二以空無分別不礙顯色喻智身無著無礙不礙利生三以日光饒益喻威勢身隨機大小皆蒙法利四以日光等照卑處光遲喻菩提身平等隨應而機小者得益恆遲如初成正覺身日先照菩薩山王是菩提身義五以日益生盲喻莊嚴身處處潛益如生盲人雖不見日起居食息猶賴日光喻極苦處佛慈潛及如隨好光明息地獄苦是莊嚴身義六以月光映蔽星宿隨時盈缺現諸淨水人人對目喻意生身圓回等住心澄佛現無向無背是圓回義隨宜修短智體恆然是等住義七以梵王普現喻化身無心普應八以醫王延壽喻力持身盡未來際九以摩尼利物喻福德身嚴剎利生雨寶利貧是嚴剎義十以如意寶王除災滿望喻願身衆生得見滿其願望此即十地中十身但不次耳第三有十種音聲者一以人天等異萬類齊聞名隨類音以風雲雷電雨形聲各隨世界差別喻之二名隨樂音以降雨滋別喻之三名隨根解音以天女妙聲喻之四以化不失時根熟必聞名隨時音以梵聲及衆喻之衆即當根熟義五名無生音以響聲隨緣喻之六名無主音以劫盡唱聲喻之七名甚深音以降霔難思喻之八名法界音以衆水一味喻之九名無斷音以天鼓開覺喻佛遍入法界化無斷絶十名無變音以權含實如雲含雨故以漸降成熟喻佛雖隨宜説而實智無變此十圓融一味是圓音也第四有十種心者心是知名如水是濕名佛知全如如外無智故佛知全智一以虗空無依喻無依成事智二以法界湛然喻體無增減智三以大海潛益喻體均益生智四以蘇竭龍宮中大寶能生海內諸寶喻佛用興體密智五以日藏等四寶變消海水喻佛滅惑成德智俗典謂沃焦石能消海水或測度而知或見寶不辨以為是石又謂注尾閭壑此但見其消以名之耳六以虗空含受喻依持無礙智如云懷六合於胸中而靈照有餘鏡萬象於方寸其神常虗即是此義七以藥王生長喻窮劫利樂智八以劫火盡燒喻知無不盡智九以劫風持壞喻巧令留惑智十以塵含經卷喻性通平等智謂無不具有佛智慧德相等此十圓融略顯智相寄顯佛心未盡佛心一毫故更應以無量無礙等知佛心也第五有十種境界者上明能知之智今辨所緣之鏡二俱無量有如函蓋所謂一切世間境界一切三世境界一切剎境界一切法境界一切衆生境界真如無差別境界法界無礙境界實際無邊際境界虗空無分量境界無境界境界此十境界無量如來境界亦無量也第六有十種行者前明智境無邊今彰運用無盡一以契如成行為真如行二以情亡為法界行二以鳥所飛空喻非量行心彌虗行彌曠終日行而未曾行四至十文顯其金翅劈海喻即智之悲日月無思喻悲不失智也第七有十種成正覺者一謂智與理冥能行不二二謂印現萬機即海印三昧三謂性相甚深言所不及四謂得四法界量等三論以諸事理即我所證彼尚即我等之何難是以聖人空洞無像物無非我會萬物以為之我其曰衆生量及一切剎一切法一切三世量等即是事法界真如量法界量等即是理法界無礙界量即事理無礙法界一切願量一切行量即事事無礙法界是名四法界五謂佛及衆生同一無性故得皆成正覺妄性本虗生元是佛真性叵得非今始成衆生不如是知故須佛化六謂成佛不成佛法界常然如世界成壞虗空無增減七謂成佛如化人化心化作如來非可思議八謂現一廣大身一一身悉亦廣大等九謂毛含法界如理而含亦如理而遍故無非佛身十謂如自心念念成佛一切衆生心亦念念成以諸佛成佛即此心也第八有十種轉法輪者謂能轉之心所轉之法所得之果能詮之教所顯之理此五體性寂寥終日言而未曾言六謂觸言皆輪七謂即用而寂八謂一即多而無主九橫則無遺十竪則無盡用而恆寂故喻書字普入一切事一切語等而無所住也第九有十種般涅槃者般是入義涅槃是圓寂義義充法界德備塵沙曰圓體窮真性妙絶相纍為寂轉化既周安住祕密為物示滅是涅槃義一謂體性具常二謂德用圓備三謂出沒常湛四言其體不遷如日現水水濁影滅五謂示滅妙存六謂隨緣起盡七謂存亡互現如幻力持經劫或有事訖便隱八謂大用無涯以寂無動故無所不動盡未來際恆作佛事九謂體離二邊身若是實則不可滅身若是虗何能起滅若有方所此現彼無由非實故起滅無恆非虗故能無不現無方故感處即形十謂結歸無住不住生死而不舍衆生也第十有十種見聞親近者此十善根不出智斷恩之三德服少金剛是喻智德少火燒多是喻斷德藥王遍益喻恩德六根皆益末舉業重衆生見聞不信亦種遠益如罵藥還靈罵沉還香罵佛猶勝敬諸外道如跋陀婆羅等罵常不輕千劫受罪罪畢還遇常不輕化度罵尚終益況於深信解行悟證慶幸可復言耶此法門不入餘衆生手唯除生如來家法王真子若無真子此法門不久散滅如轉輪王無正太子王滅之後王之七寶七日之內自然散滅者明三乘無利生悲智皆名餘衆生若無大心凡夫信樂悟入則衆生界佛種斷絶法不流通故不付囑諸大菩薩而流通乃仗大心士也會中大衆皆得一生記者明自既得果而所化之衆皆亦三世見亡見如實法同一體性為得一生記也此經有三終因果者初會是佛自分五位因果一終第二會直至八會此品是學佛之士信及五位進修因果一終十會法界一品是善財修證為世榜式五位因果一終是為三終如下九會離世間品是成佛後恆利世間普賢無盡之行故出現品遂付囑流通也離世間品第三十八第九會還於普光明殿説離世間品者普慧以五位法與二百問普賢所酬二千法門是成佛後純用利生普賢常行與初會中佛自普賢行功用相似故初會中亦普賢為法主善財參學已畢却入普賢身中亦是證入此之法門夫法界中成佛不成佛俱不可得但法界虗空界衆生界無盡則普賢行終無有盡此之大行三世十方諸佛一道齊同其間示現修行成佛乃至涅槃總是普光明智中普賢之行故還於普光明殿説以成佛亦一念成説教亦一念説人間天上一時頓印故升天諸會皆云不離普光明殿而此品還序始成正覺之時離世有二義世間性空是為性離行成無染是為事離以悲無不智故世無不離常在世間未曾不出智無不悲故離無不世常越世表無不遊世是離世義也二百問者初二十句問十信行次二十句問十住行次三十句問十行之行次二十九句問十回向行次五十句問十地行後五十一句問因圓果滿行此品是成佛後利生常行而復致問如此以是一念頓印之門一念該一切念一切念念念體同以故圓融行布同別自在此經四翻六位初會約信分二會至八會約解分此約行分法界品約證分是四分而四分皆六位法也
